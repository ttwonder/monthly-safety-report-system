            if (!files || files.length === 0) return;
            showLoader();
            if (!reportData[index].attachments) reportData[index].attachments = [];
            const promises = Array.from(files).map(file => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve({ name: file.name, data: e.target.result });
                    reader.readAsDataURL(file);
                });
            });
            Promise.all(promises).then(async (newAtts) => {
                reportData[index].attachments = reportData[index].attachments.concat(newAtts);
                await saveToDB(reportData);
                renderTable();
                hideLoader();
            });
        }

        // 終極安全純文字萃取 (防止 undefined 報錯)
        function extractText(html) {
            try {
                const tmp = document.createElement('div');
                tmp.innerHTML = html || '';
                
                tmp.querySelectorAll('.kpi-card-container').forEach(card => {
                    let title = (card.querySelector('div[contenteditable="true"]')?.textContent || '').trim() || 'KPI指標';
                    let curLabel = (card.querySelector('.kpi-label-current')?.textContent || '').trim() || '現值';
                    let tgtLabel = (card.querySelector('.kpi-label-target')?.textContent || '').trim() || '目標';
                    let current = (card.querySelector('.current-val')?.textContent || '').trim() || '0';
                    let target = (card.querySelector('.target-val')?.textContent || '').trim() || '0';
                    let newText = document.createTextNode(`\n[卡片: ${title}] ${curLabel}: ${current}, ${tgtLabel}: ${target}\n`);
                    if(card.parentNode) card.parentNode.replaceChild(newText, card);
                });

                tmp.querySelectorAll('.progress-card-container').forEach(card => {
                    let title = (card.querySelector('div[contenteditable="true"]')?.textContent || '').trim() || '項目名稱';
                    let progLabel = (card.querySelector('.progress-label')?.textContent || '').trim() || '完成度';
                    let val = (card.querySelector('.progress-val')?.textContent || '').trim() || '0';
                    let newText = document.createTextNode(`\n[卡片: ${title}] ${progLabel}: ${val}%\n`);
                    if(card.parentNode) card.parentNode.replaceChild(newText, card);
                });

                tmp.querySelectorAll('.zone-card-container').forEach(card => {
                    let title = (card.querySelector('div[contenteditable="true"]')?.textContent || '').trim() || '評估指標';
                    let curLabel = (card.querySelector('.zone-label-current')?.textContent || '').trim() || '現值';
                    let current = (card.querySelector('.current-val')?.textContent || '').trim() || '0';
                    let newText = document.createTextNode(`\n[卡片: ${title}] ${curLabel}: ${current}\n`);
                    if(card.parentNode) card.parentNode.replaceChild(newText, card);
                });

                tmp.querySelectorAll('.data-card-table').forEach(table => {
                    let title = (table.querySelector('th')?.textContent || '').trim() || '指標名稱';
                    let rows = Array.from(table.querySelectorAll('tbody tr')).map(tr => {
                        let tds = tr.querySelectorAll('td');
                        if(tds.length === 2) return `${(tds[0].textContent || '').trim()}: ${(tds[1].textContent || '').trim()}`;
                        return '';
                    }).filter(r=>r).join(', ');
                    let newText = document.createTextNode(`\n[卡片: ${title}] ${rows}\n`);
                    if(table.parentNode) table.parentNode.replaceChild(newText, table);
                });

                const highlights = tmp.querySelectorAll('.highlight-val');
                highlights.forEach(h => h.textContent = '【' + h.textContent + '】');
                const titles = tmp.querySelectorAll('.block-title');
                titles.forEach(t => t.textContent = '\n[' + t.textContent + ']\n');

                tmp.querySelectorAll('br').forEach(br => {
                    if(br.parentNode) br.parentNode.replaceChild(document.createTextNode('\n'), br);
                });
                tmp.querySelectorAll('div, p, table, ul, ol, li').forEach(el => {
                    try {
                        if (el.parentNode) {
                            el.insertAdjacentText('beforebegin', '\n');
                            el.insertAdjacentText('afterend', '\n');
                        }
                    } catch (ign) {}
                });
                return tmp.textContent.replace(/[ \t]+/g, ' ').replace(/\n\s*\n/g, '\n').trim();
            } catch(e) {
                console.error("純文字萃取發生錯誤", e);
                return "內容解析錯誤";
            }
        }

        function exportExcel() {
            // 最強離線防護機制
            if (typeof XLSX === 'undefined') {
                alert("找不到 Excel 匯出模組！\n\n原因：您的網路可能受到限制或處於離線狀態，無法載入外部套件 (SheetJS)。\n請確保網路連線正常或解除內網封鎖後重試。");
                return;
            }

            try {
                let maxChunks = 0; // 用來計算最多切了幾塊，以便擴充隱藏欄位
                
                const exportData = reportData.map((item, index) => {
                    const itemCopy = JSON.parse(JSON.stringify(item));
                    itemCopy.attachments = []; 
                    
                    const cols = Array.isArray(itemCopy.columns) ? itemCopy.columns : (itemCopy.columns ? [itemCopy.columns] : ['']);
                    
                    let plainTextPreview = cols.map(c => {
                        const tempDiv = document.createElement('div');
                        tempDiv.innerHTML = c || '';
                        tempDiv.querySelectorAll('img.content-inline-img, .trend-chart-container').forEach(el => {
                            if (el.tagName === 'IMG') { el.src = ''; el.alt = '[圖片已被保留在系統中]'; el.style.display = 'none'; }
                            if (el.classList.contains('trend-chart-container')) { el.innerHTML = '\n[動態趨勢圖已被保留在系統中]\n'; }
                        });
                        return extractText(tempDiv.innerHTML);
                    }).join('\n\n--- 分欄 ---\n\n');
                    
                    // 【防崩潰核心】：截斷過長的預覽文字，防止突破 Excel 儲存格極限
                    if (plainTextPreview.length > 30000) {
                        plainTextPreview = plainTextPreview.substring(0, 30000) + '\n...[內容過長已截斷，完整版式請於系統內查看]';
                    }
                    
                    itemCopy.columns = cols.map(c => {
                        const tempDiv = document.createElement('div');
                        tempDiv.innerHTML = c || '';
                        tempDiv.querySelectorAll('img.content-inline-img').forEach(img => { img.src = ''; });
                        return tempDiv.innerHTML;
                    });

                    let titleText = extractText(item.title || '');
                    if (titleText.length > 30000) titleText = titleText.substring(0, 30000) + '...';
                    
                    const rowExport = {
                        "項次": index + 1, 
                        "報告條目": titleText, 
                        "具體報告內容": plainTextPreview
                    };

                    // 【防崩潰核心】：將超大 JSON 字串切塊存入不同欄位，徹底繞過 32767 限制
                    const rawString = encodeURIComponent(JSON.stringify(itemCopy));
                    const chunkSize = 30000;
                    let chunkCount = 0;
                    for (let i = 0; i < rawString.length; i += chunkSize) {
                        rowExport[`__SystemRawData_${chunkCount}__`] = rawString.slice(i, i + chunkSize);
                        chunkCount++;
                    }
                    if (chunkCount > maxChunks) maxChunks = chunkCount;

                    return rowExport;
                });

                const worksheet = XLSX.utils.json_to_sheet(exportData);
                
                // 動態生成隱藏欄位設定，隱藏所有被切塊的系統資料欄
                const colWidths = [{ wch: 8 }, { wch: 30 }, { wch: 80 }];
                for (let i = 0; i < maxChunks; i++) {
                    colWidths.push({ hidden: true });
                }
                worksheet['!cols'] = colWidths; 
                
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "報告內容");
                
                const dateInput = document.getElementById('reportDate');
                const dateStr = dateInput && dateInput.value ? dateInput.value : new Date().toISOString().slice(0,10);
                
                const titleEl = document.getElementById('mainTitle');
                let titleStr = titleEl ? (titleEl.textContent || '').trim() : '報告';
                if (!titleStr) titleStr = '報告';
                titleStr = titleStr.replace(/[\/\?<>\\:\*\|"]/g, '_').replace(/[\r\n]+/g, '');
                
                XLSX.writeFile(workbook, `${titleStr}_${dateStr}.xlsx`);
            } catch (err) {
                console.error("匯出Excel失敗:", err);
                alert("匯出Excel時發生錯誤！\n錯誤詳情：" + err.message + "\n請查看控制台 (F12) 獲取更多資訊。");
            }
        }

        function importExcel(event) {
            if (typeof XLSX === 'undefined') {
                alert("找不到 Excel 匯入模組！請確認網路是否正常連線。");
                return;
            }
            
            const file = event.target.files[0];
            if (!file) return;
            showLoader();
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    if (jsonData.length > 0) {
                        reportData = jsonData.map((row, index) => {
                            // 【防崩潰核心】：將匯出的多塊欄位無縫拼接回來
                            let raw = '';
                            if (row['__SystemRawData_0__'] !== undefined) {
                                let idx = 0;
                                while (row[`__SystemRawData_${idx}__`] !== undefined) {
                                    raw += row[`__SystemRawData_${idx}__`];
                                    idx++;
                                }
                            } else if (row['__SystemRawData__'] !== undefined) {
                                raw = row['__SystemRawData__']; // 兼容舊版單一欄位
                            }

                            if (raw) {
                                try {
                                    try { return JSON.parse(decodeURIComponent(escape(atob(raw)))); } 
                                    catch { return JSON.parse(decodeURIComponent(raw)); }
                                } catch(err) { console.warn('無法還原隱藏版式', err); }
                            }

                            const rawCols = (row['具體報告內容'] || row['具體報告內容模板'] || '').toString();
                            const columnsArr = rawCols.split('--- 分欄 ---').map(c => parseHighlights(c.trim().replace(/\n/g, '<br>')));
                            return {
                                id: Date.now() + index, icon: "fas fa-angle-right", iconColor: "#4f46e5", 
                                colLayout: columnsArr.length > 0 ? Array(columnsArr.length).fill('1').join(':') : "1",
                                colCount: columnsArr.length > 0 ? columnsArr.length : 1,
                                title: (row['報告條目'] || '').toString().replace(/\n/g, '<br>'),
                                columns: columnsArr,
                                attachments: [] 
                            };
                        });
                        
                        await manualSave(false);
                        renderTable();
                        showToast('Excel 匯入成功並已保存！');
                        
                        // 確保所有新卡片在匯入後重新定位標線
                        setTimeout(() => {
                            document.querySelectorAll('.kpi-card-container').forEach(card => window.updateKpiCard(card));
                            document.querySelectorAll('.progress-card-container').forEach(card => window.updateProgressCard(card));
                            document.querySelectorAll('.zone-card-container').forEach(card => window.updateZoneCard(card));
                            window.renderAllCharts();
                        }, 300);
                    }
                } catch (error) { 
                    alert('Excel 解析失敗：' + error.message); 
                }
                document.getElementById('excelUpload').value = '';
                hideLoader();
            };
            reader.readAsArrayBuffer(file);
        }

        function v1PlainText(html) {
            const tmp = document.createElement('div');
            tmp.innerHTML = html || '';
            return (tmp.textContent || '').trim();
        }

        function v1EscapeAttr(text) {
            return String(text || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function v1GetCategory(item) {
            const title = v1PlainText(item && item.title ? item.title : '');
            for (const cat of V1_CATEGORY_DEFS) {
                if (cat.id !== 'custom' && cat.match.some(key => title.includes(key))) return cat;
            }
            return V1_CATEGORY_DEFS[V1_CATEGORY_DEFS.length - 1];
        }

        function v1EnsureModuleFields() {
            if (!Array.isArray(reportData)) return;
            reportData.forEach((item, index) => {
                if (typeof item.selectedForPdf === 'undefined') item.selectedForPdf = true;
                if (typeof item.pdfOrder === 'undefined') item.pdfOrder = index + 1;
                if (!item.moduleCategory) item.moduleCategory = v1GetCategory(item).id;
            });
        }

        function v1GetSelectedModules() {
            v1EnsureModuleFields();
            return reportData
                .map((item, index) => ({ item, index, category: v1GetCategory(item), order: Number(item.pdfOrder || index + 1) }))
                .filter(x => x.item.selectedForPdf !== false)
                .sort((a, b) => (a.order - b.order) || (a.index - b.index));

        function waitForV1PdfCharts(timeoutMs = 900) {
            return new Promise(resolve => {
                const start = Date.now();
                const tick = () => {
                    const charts = Array.from(document.querySelectorAll('#pdfPrintArea .trend-chart-container'));
                    if (!charts.length) return resolve(true);
                    const ready = charts.every(container => {
                        const canvas = container.querySelector('canvas.trend-canvas');
                        const area = container.querySelector('.chart-canvas-area');
                        const rect = area ? area.getBoundingClientRect() : { width: 0, height: 0 };
                        return canvas && canvas.width > 10 && canvas.height > 10 && rect.width > 10 && rect.height > 10;
                    });
                    if (ready || Date.now() - start > timeoutMs) return resolve(ready);
                    setTimeout(tick, 80);
                };
                tick();
            });
        }

        async function prepareV1PdfPrintArea() {
            const printArea = document.getElementById('pdfPrintArea');
            if (!printArea) return false;
            printArea.innerHTML = buildV1PdfHtml();
            document.body.classList.add('pdf-render-prep');
            await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
            if (window.renderAllCharts) window.renderAllCharts();
            await waitForV1PdfCharts();
            if (window.renderAllCharts) window.renderAllCharts();
            await new Promise(resolve => setTimeout(resolve, 180));
            return true;
        }

        async function v1ListSavedReports() {

            return new Promise((resolve, reject) => {
                const tx = db.transaction([STORE_NAME], 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const req = store.getAll();
                req.onsuccess = () => resolve((req.result || []).sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)));

        async function v1DeleteReportById(fileId) {
            if (!fileId) return;
            if (fileId === window.currentFileId) {
                showToast('目前正在使用的月報不能直接刪除，請先切換到其他月報。');
                return;
            }
            const saved = await loadFromDB(fileId);
            const title = saved?.title || fileId;
            if (!confirm(`確定刪除這份本地歷史月報？\n\n${title}\nID：${fileId}\n\n此操作只刪除本機 IndexedDB 歷史，不會刪除雲端資料。`)) return;
            const db = await initDB();
            await new Promise((resolve, reject) => {
                const tx = db.transaction([STORE_NAME], 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const req = store.delete(fileId);
                req.onsuccess = () => resolve(true);
                req.onerror = (e) => reject(e);
            });
            showToast('已刪除本地歷史月報');
            renderV1HistoryPane();

        async function saveV2Records(records) {
            v2RecordsCache = Object.assign(v2BlankRecords(), records || {});
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction([STORE_NAME], 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.put({ id: V2_RECORD_STORE_ID, data: v2RecordsCache, title: 'V2資料記錄庫', timestamp: Date.now() });
                tx.oncomplete = () => {
                    if (typeof v4QueueAutoSave === 'function') v4QueueAutoSave('資料記錄');
                    resolve();
                };
                tx.onerror = (e) => reject(e);

        function v2RecordText(value) {
            return String(value || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

        function v2ToNum(v) {
            const n = Number(String(v || 0).replace(/[^0-9.-]/g,''));

        function v2GetReportDateRange() {
            const reportDate = document.getElementById('reportDate')?.value || new Date().toISOString().slice(0,10);
            const year = Number(reportDate.slice(0,4)) || new Date().getFullYear();
            const sm = Number(document.getElementById('startMonth')?.value || 1);
            const sd = Number(document.getElementById('startDay')?.value || 1);
            const em = Number(document.getElementById('endMonth')?.value || sm);
            const ed = Number(document.getElementById('endDay')?.value || 31);
            const start = new Date(year, sm - 1, sd);
            let end = new Date(year, em - 1, ed, 23, 59, 59, 999);
            if (end < start) end = new Date(year + 1, em - 1, ed, 23, 59, 59, 999);
            return { start, end, label: `${String(sm).padStart(2,'0')}/${String(sd).padStart(2,'0')} - ${String(em).padStart(2,'0')}/${String(ed).padStart(2,'0')}`, year };
        }

        function v2InRange(dateStr, range) {
            if (!dateStr) return false;
            const d = new Date(dateStr);
            if (Number.isNaN(d.getTime())) return false;
            return d >= range.start && d <= range.end;
        }

        function v2CalcStats(records) {
            const range = v2GetReportDateRange();
            const inspections = (records.inspections || []).filter(r => v2InRange(r.date, range));
            const deficiencies = (records.deficiencies || []).filter(r => v2InRange(r.date, range));
            const detentions = (records.detentions || []).filter(r => v2InRange(r.date, range));
            const actions = (records.actions || []).filter(r => v2InRange(r.dueDate, range) || !r.dueDate);
            const byType = {};
            inspections.forEach(r => { const t = r.inspectionType || '其他'; byType[t] = (byType[t] || 0) + 1; });
            const deficiencyTotal = inspections.reduce((sum, r) => sum + v2ToNum(r.deficiencyCount), 0) + deficiencies.length;
            const detentionTotal = inspections.reduce((sum, r) => sum + v2ToNum(r.detentionCount), 0) + detentions.length;
            const pscInspections = inspections.filter(r => r.inspectionType === 'PSC');
            const pscDef = pscInspections.reduce((sum, r) => sum + v2ToNum(r.deficiencyCount), 0) + deficiencies.filter(r => r.inspectionType === 'PSC').length;
            const completedActions = actions.filter(r => r.status === '已完成').length;
            return {
                range, inspections, deficiencies, detentions, actions, byType,
                inspectionCount: inspections.length,
                deficiencyTotal,
                detentionTotal,
                highRiskCount: deficiencies.filter(r => r.severity === '高').length,
                repeatedCount: deficiencies.filter(r => r.isRepeated === '是').length,
                pscCount: pscInspections.length,
                pscAvg: pscInspections.length ? (pscDef / pscInspections.length) : 0,
                completedActions,
                actionCompletionRate: actions.length ? Math.round((completedActions / actions.length) * 100) : 0
            };
        }

        function renderV2Field(kind, field, value = '') {

            if (type.startsWith('select:')) {

        async function addV2Record(kind) {
            const schema = V2_RECORD_SCHEMAS[kind];
            const records = await loadV2Records();
            const editingId = document.getElementById(`v2-${kind}-editing-id`)?.value || '';
            const item = editingId ? (records[kind].find(x => String(x.id) === String(editingId)) || { id: editingId, createdAt: new Date().toISOString() }) : { id: Date.now(), createdAt: new Date().toISOString() };
            item.updatedAt = new Date().toISOString();
            schema.fields.forEach(([key]) => {

            if (kind === 'inspections' && !item.date && !item.vessel && !item.port) { showToast('請至少填寫檢查日期、船名或港口'); return; }
            if (kind === 'deficiencies' && !item.vessel && !item.originalText && !item.summary) { showToast('請至少填寫船名、原始描述或摘要'); return; }
            if (kind === 'detentions' && !item.vessel && !item.detentionReason) { showToast('請至少填寫船名或滯留原因'); return; }

        function v2Download(filename, content, type='text/plain;charset=utf-8') {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        async function v2ExportAllRecordsJson() {
            const records = await loadV2Records();
            v2Download(`monthly-report-records-${new Date().toISOString().slice(0,10)}.json`, JSON.stringify({ version: 2, exportedAt: new Date().toISOString(), records }, null, 2), 'application/json;charset=utf-8');
        }

        function v2ImportAllRecordsJson(event) {
            const file = event.target.files && event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async () => {
                try {
                    const obj = JSON.parse(reader.result);
                    const records = Object.assign(v2BlankRecords(), obj.records || obj);
                    await saveV2Records(records);
                    showToast('記錄 JSON 匯入成功');
                    renderV1RecordsPane();
                } catch (err) {
                    alert('匯入失敗：' + err.message);
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        async function v2ExportCsv(kind) {

            const keys = schema.fields.map(([key]) => key);

            v2Download(`${kind}-${new Date().toISOString().slice(0,10)}.csv`, '\ufeff' + csv, 'text/csv;charset=utf-8');
        }

        // === V3 KPI / 趨勢自動化 ===
        let v3TrendMonths = 6;

        function v3MonthLabel(date) {
            return `${String(date.getFullYear()).slice(2)}/${String(date.getMonth() + 1).padStart(2, '0')}`;
        }

        function v3MonthRange(anchorDate, offset) {
            const d = new Date(anchorDate.getFullYear(), anchorDate.getMonth() + offset, 1);
            return {
                start: new Date(d.getFullYear(), d.getMonth(), 1),
                end: new Date(d.getFullYear(), d.getMonth() + 1, 0, 23, 59, 59, 999),
                label: v3MonthLabel(d)
            };
        }

        function v3RecordDate(row, fallbackKey = 'date') {
            return row && (row[fallbackKey] || row.date || row.dueDate || row.releaseDate || '');
        }

        function v3InMonth(row, range, fallbackKey = 'date') {
            return v2InRange(v3RecordDate(row, fallbackKey), range);
        }

        function v3MonthlyStats(records, months = v3TrendMonths) {
            const reportDate = document.getElementById('reportDate')?.value || new Date().toISOString().slice(0, 10);
            const anchor = new Date(reportDate);
            const safeAnchor = Number.isNaN(anchor.getTime()) ? new Date() : anchor;
            const rows = [];
            for (let i = months - 1; i >= 0; i--) {
                const range = v3MonthRange(safeAnchor, -i);
                const inspections = (records.inspections || []).filter(r => v3InMonth(r, range, 'date'));
                const deficiencies = (records.deficiencies || []).filter(r => v3InMonth(r, range, 'date'));
                const detentions = (records.detentions || []).filter(r => v3InMonth(r, range, 'date'));
                const actions = (records.actions || []).filter(r => v3InMonth(r, range, 'dueDate'));
                const trainings = (records.trainings || []).filter(r => v3InMonth(r, range, 'date'));
                const pscInspections = inspections.filter(r => r.inspectionType === 'PSC');
                const pscDef = pscInspections.reduce((sum, r) => sum + v2ToNum(r.deficiencyCount), 0) + deficiencies.filter(r => r.inspectionType === 'PSC').length;
                const completedActions = actions.filter(r => r.status === '已完成').length;
                rows.push({
                    label: range.label,
                    inspectionCount: inspections.length,
                    deficiencyTotal: inspections.reduce((sum, r) => sum + v2ToNum(r.deficiencyCount), 0) + deficiencies.length,
                    detentionTotal: inspections.reduce((sum, r) => sum + v2ToNum(r.detentionCount), 0) + detentions.length,
                    pscAvg: pscInspections.length ? Number((pscDef / pscInspections.length).toFixed(2)) : 0,
                    highRiskCount: deficiencies.filter(r => r.severity === '高').length,
                    repeatedCount: deficiencies.filter(r => r.isRepeated === '是').length,
                    actionCompletionRate: actions.length ? Math.round((completedActions / actions.length) * 100) : 0,
                    safetyWalkCount: inspections.filter(r => r.inspectionType === 'Safety Walk').length + trainings.filter(r => r.activityType === 'Safety Walk').length,
                    trainingCount: trainings.length
                });
            }
            return rows;
        }

        function v3DeltaText(current, previous, suffix = '') {
            const cur = Number(current || 0), prev = Number(previous || 0);
            const diff = cur - prev;
            if (diff === 0) return `持平 (${cur}${suffix})`;
            return `${diff > 0 ? '增加' : '減少'} ${Math.abs(diff).toFixed(Number.isInteger(diff) ? 0 : 2)}${suffix} (${prev}${suffix} → ${cur}${suffix})`;
        }

        function v3SparkSvg(values, color = '#4f46e5', height = 42) {
            const width = 160;
            const nums = values.map(v => Number(v || 0));
            const max = Math.max(1, ...nums);
            const min = Math.min(0, ...nums);
            const range = Math.max(1, max - min);
            const step = nums.length > 1 ? width / (nums.length - 1) : width;
            const points = nums.map((v, i) => `${i * step},${height - ((v - min) / range) * (height - 6) - 3}`).join(' ');
            return `<svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" aria-label="sparkline"><polyline fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" points="${points}"/><line x1="0" y1="${height-2}" x2="${width}" y2="${height-2}" stroke="#e2e8f0" stroke-width="1"/></svg>`;
        }

        function v3MultiLineSvg(rows) {
            const width = 720, height = 260, left = 42, right = 16, top = 20, bottom = 42;
            const series = [
                { key: 'inspectionCount', label: '檢查', color: '#2563eb' },
                { key: 'deficiencyTotal', label: '缺失/觀察', color: '#f97316' },
                { key: 'detentionTotal', label: '滯留/重大', color: '#dc2626' },
                { key: 'actionCompletionRate', label: '行動完成率', color: '#16a34a' }
            ];
            const max = Math.max(1, ...series.flatMap(s => rows.map(r => Number(r[s.key] || 0))));
            const plotW = width - left - right, plotH = height - top - bottom;
            const x = i => left + (rows.length <= 1 ? plotW / 2 : (i * plotW / (rows.length - 1)));
            const y = v => top + plotH - (Number(v || 0) / max) * plotH;
            const lines = series.map(s => {
                const pts = rows.map((r, i) => `${x(i)},${y(r[s.key])}`).join(' ');
                const circles = rows.map((r, i) => `<circle cx="${x(i)}" cy="${y(r[s.key])}" r="3" fill="${s.color}"/>`).join('');
                return `<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>${circles}`;
            }).join('');
            const labels = rows.map((r, i) => `<text x="${x(i)}" y="${height - 18}" text-anchor="middle" font-size="11" fill="#475569">${r.label}</text>`).join('');
            const grid = [0, .25, .5, .75, 1].map(t => `<line x1="${left}" y1="${top + plotH * t}" x2="${width - right}" y2="${top + plotH * t}" stroke="#e2e8f0"/><text x="${left - 8}" y="${top + plotH * t + 4}" text-anchor="end" font-size="10" fill="#94a3b8">${Math.round(max * (1 - t))}</text>`).join('');
            const legend = series.map((s, i) => `<span style="display:inline-flex;align-items:center;gap:4px;margin-right:10px;"><span style="width:10px;height:10px;border-radius:99px;background:${s.color};display:inline-block;"></span>${s.label}</span>`).join('');
            return `<div style="border:1px solid #dbeafe;border-radius:10px;padding:8px;background:#fff;break-inside:avoid;"><div style="font-size:12px;color:#334155;margin-bottom:4px;">${legend}</div><svg viewBox="0 0 ${width} ${height}" width="100%" height="260" role="img" aria-label="KPI 趨勢圖">${grid}${lines}${labels}</svg></div>`;
        }

        let V4_STARTUP_SYNC_DONE = false;

        function v4GetDefaultCloudConfig() {
            const cfg = window.MONTHLY_REPORT_SUPABASE_CONFIG || {};
            return {
                supabaseUrl: String(cfg.supabaseUrl || cfg.url || 'https://pgkemqnqhtfssxeodavu.supabase.co').trim().replace(/\/$/, ''),

            };
        }

        function v4GetCloudConfig() {
            const base = v4GetDefaultCloudConfig();
            try {
                const saved = JSON.parse(localStorage.getItem(V4_CLOUD_CONFIG_KEY) || '{}');
                ['supabaseUrl','anonKey','workspaceKey','lastCloudUpdatedAt','lastSyncAt','lastUpdatedBy'].forEach(key => {
                    if (String(saved[key] || '').trim()) base[key] = String(saved[key]).trim();
                });
                if (Number.isFinite(Number(saved.cloudRevision))) base.cloudRevision = Number(saved.cloudRevision);
                if (typeof saved.autoSyncOnOpen === 'boolean') base.autoSyncOnOpen = saved.autoSyncOnOpen;
                // 手動模式：保留舊設定相容，但不再允許本機自動上傳雲端。
                base.autoSave = false;
                if (Number(saved.autoSaveDelayMs)) base.autoSaveDelayMs = Number(saved.autoSaveDelayMs);
                base.supabaseUrl = base.supabaseUrl.replace(/\/$/, '');

            } catch {

        }

        function v4SetCloudRuntimeStatus(text, kind = 'muted') {
            V4_CLOUD_STATUS_TEXT = text || '';

                el.textContent = V4_CLOUD_STATUS_TEXT;
                el.className = 'text-slate-500';
                if (kind === 'ok') el.className = 'text-emerald-700 font-bold';
                if (kind === 'warn') el.className = 'text-amber-700 font-bold';
                if (kind === 'error') el.className = 'text-rose-700 font-bold';
            }
        }

        function v4CloudStatusHtml() {
            const cls = V4_CLOUD_STATUS_KIND === 'ok' ? 'text-emerald-700 font-bold' : V4_CLOUD_STATUS_KIND === 'warn' ? 'text-amber-700 font-bold' : V4_CLOUD_STATUS_KIND === 'error' ? 'text-rose-700 font-bold' : 'text-slate-500';
            return `<span id="v4-cloud-runtime-status" class="${cls}">${v2RecordText(V4_CLOUD_STATUS_TEXT)}</span>`;
        }

        function v4SaveCloudConfigFromForm() {
            if (!v5RequireSupabaseOwner()) return;
            const config = v4GetCloudConfig();
            config.supabaseUrl = (document.getElementById('v4-supabase-url')?.value || '').trim().replace(/\/$/, '');
            config.anonKey = (document.getElementById('v4-supabase-anon')?.value || '').trim();
            config.workspaceKey = (document.getElementById('v4-workspace-key')?.value || '').trim();
            localStorage.setItem(V4_CLOUD_CONFIG_KEY, JSON.stringify(config));
            v5ClearSupabaseConfigDraft();
            showToast('雲端設定已保存於本機');
            renderV4CloudPane();
        }

        function v4GenerateWorkspaceKey() {
            if (!v5RequireSupabaseOwner()) return;
            const arr = new Uint8Array(18);
            crypto.getRandomValues(arr);
            const key = Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
            const el = document.getElementById('v4-workspace-key');
            if (el) el.value = `monthly-${key}`;
        }

        function v4ConfigReady(config = v4GetCloudConfig()) {
            return !!(config.supabaseUrl && config.anonKey && config.workspaceKey);
        }

        async function v4CloudRequest(path, method = 'GET', body = null) {
            const config = v4GetCloudConfig();
            if (!v4ConfigReady(config)) throw new Error('請先填寫 Supabase URL、anon key、Workspace Key');
            const headers = {
                'apikey': config.anonKey,
                'Authorization': 'Bearer ' + config.anonKey,
                'Content-Type': 'application/json'
            };
            if (method !== 'GET') headers.Prefer = 'return=representation,resolution=merge-duplicates';
            const res = await fetch(`${config.supabaseUrl}/rest/v1/${path}`, {
                method,
                headers,
                body: body ? JSON.stringify(body) : null
            });
            const text = await res.text();
            let data = null;
            try { data = text ? JSON.parse(text) : null; } catch { data = text; }
            if (!res.ok) throw new Error(typeof data === 'string' ? data : (data && (data.message || data.details)) || `HTTP ${res.status}`);
            // Supabase RPC returning TABLE comes back as [{ payload, updated_at }].
            // Normalize it so sync code can consistently use data.payload / data.updated_at.
            if (Array.isArray(data) && data.length === 1 && data[0] && Object.prototype.hasOwnProperty.call(data[0], 'payload')) return data[0];
            return data;
        }

        function v6CurrentActor() {
            const user = v5CurrentUser();
            if (user) return {
                id: String(user.username || 'user'),
                name: String(user.displayName || user.username || '使用者')
            };
            let anon = localStorage.getItem('monthly_report_v6_actor_id');
            if (!anon) {
                anon = 'anon-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
                localStorage.setItem('monthly_report_v6_actor_id', anon);
            }
            return { id: anon, name: '未登入使用者' };
        }

        function v6SaveCloudMetaToConfig(config, data) {
            if (!config || !data) return config;
            if (Number.isFinite(Number(data.revision))) config.cloudRevision = Number(data.revision);
            if (Number.isFinite(Number(data.latest_revision))) config.cloudRevision = Number(data.latest_revision);
            config.lastCloudUpdatedAt = data.updated_at || data.latest_updated_at || config.lastCloudUpdatedAt || '';
            config.lastUpdatedBy = data.updated_by || data.latest_updated_by || config.lastUpdatedBy || '';
            config.lastSyncAt = new Date().toISOString();
            localStorage.setItem(V4_CLOUD_CONFIG_KEY, JSON.stringify(config));
            return config;
        }

        function v6ConflictMessage(data) {
            const who = data?.latest_updated_by ? `，最後保存者：${data.latest_updated_by}` : '';
            const rev = data?.latest_revision ? `，雲端版本：${data.latest_revision}` : '';
            return `雲端資料已被其他人更新${who}${rev}。為避免覆蓋，請先按「同步最新」，確認內容後再保存。`;
        }

        async function v4BuildCloudBundle() {
            if (document.activeElement && typeof document.activeElement.blur === 'function') document.activeElement.blur();
            await saveToDB(reportData, Date.now());
            const records = await loadV2Records();
            return {
                app: 'monthly-safety-report-system',
                version: 6,
                exportedAt: new Date().toISOString(),
                fileId: window.currentFileId,
                report: {
                    title: document.getElementById('mainTitle')?.innerText || '月度安全會議報告',
                    date: document.getElementById('reportDate')?.value || '',
                    period: {
                        startM: document.getElementById('startMonth')?.value || '',
                        startD: document.getElementById('startDay')?.value || '',
                        endM: document.getElementById('endMonth')?.value || '',
                        endD: document.getElementById('endDay')?.value || ''
                    },
                    modules: reportData
                },
                records,
                users: v5GetUsers()
            };
        }

        async function v4ApplyCloudBundle(bundle, sourceLabel = '雲端', options = {}) {
            if (!bundle || !bundle.report || !Array.isArray(bundle.report.modules)) throw new Error('資料格式不正確');
            V4_CLOUD_APPLYING = true;
            try {
                window.currentFileId = bundle.fileId || window.currentFileId || ('report_' + Date.now());
                localStorage.setItem('safety_report_file_id', window.currentFileId);
                reportData = normalizeData(bundle.report.modules);
                document.getElementById('mainTitle').innerText = bundle.report.title || '月度安全會議報告';
                document.getElementById('reportDate').value = bundle.report.date || new Date().toISOString().slice(0,10);
                if (bundle.report.period) {
                    document.getElementById('startMonth').value = bundle.report.period.startM || document.getElementById('startMonth').value;
                    document.getElementById('startDay').value = bundle.report.period.startD || document.getElementById('startDay').value;
                    document.getElementById('endMonth').value = bundle.report.period.endM || document.getElementById('endMonth').value;
                    document.getElementById('endDay').value = bundle.report.period.endD || document.getElementById('endDay').value;
                }
                await saveToDB(reportData, Date.now());
                if (bundle.records) await saveV2Records(Object.assign(v2BlankRecords(), bundle.records));
                if (Array.isArray(bundle.users)) v5SetUsers(bundle.users);
                v2RecordsCache = null;
                renderTable();
                renderV1ModuleLibrary();
                renderV1PdfCenter();
                renderV1RecordsPane();
                renderV3TrendPane();
                renderV5SessionBar();
                if (!options.silent) showToast(`已套用${sourceLabel}資料`);
            } finally {
                V4_CLOUD_APPLYING = false;
            }
        }

        async function v4UploadToCloud(options = {}) {
            const silent = options.silent === true;
            if (V4_CLOUD_SAVING) return false;
            try {
                const config = v4GetCloudConfig();
                if (!v4ConfigReady(config)) throw new Error('請先填寫 Supabase URL、anon key、Workspace Key');
                V4_CLOUD_SAVING = true;
                v4SetCloudRuntimeStatus('正在保存到雲端...', 'muted');
                if (V6_LOCK_BLOCKED) throw new Error('目前區塊被其他人鎖定，不能保存。');
                const actor = v6CurrentActor();
                const payload = await v4BuildCloudBundle();
                const expectedRevision = Number.isFinite(Number(config.cloudRevision)) ? Number(config.cloudRevision) : null;
                const data = await v4CloudRequest('rpc/upsert_monthly_report_cloud_data', 'POST', { p_workspace_key: config.workspaceKey, p_payload: payload, p_expected_revision: expectedRevision, p_saved_by: actor.name });
                if (data && data.conflict) {
                    const msg = v6ConflictMessage(data);
                    v4SetCloudRuntimeStatus(msg, 'error');
                    if (!silent) alert(msg);
                    return false;
                }
                v6SaveCloudMetaToConfig(config, data || {});
                v4SetCloudRuntimeStatus(`雲端已保存：${v4FmtTime(config.lastSyncAt)}｜版本 ${config.cloudRevision || '—'}`, 'ok');
                if (!silent) showToast('已安全保存到 Supabase 雲端');
                renderV4CloudPane();
                renderV5SessionBar();
                return true;
            } catch (err) {
                console.error(err);
                v4SetCloudRuntimeStatus('雲端保存失敗：' + err.message, 'error');
                if (!silent) alert('保存失敗：' + err.message);
                return false;
            } finally {
                V4_CLOUD_SAVING = false;
            }
        }

        async function v4DownloadFromCloud() {
            try {
                const config = v4GetCloudConfig();
                const data = await v4CloudRequest('rpc/get_monthly_report_cloud_data', 'POST', { p_workspace_key: config.workspaceKey });
                if (!data || !data.payload) { alert('雲端沒有找到此 Workspace Key 的資料。'); return; }
                if (!confirm('確定用雲端資料覆蓋目前本機資料嗎？建議先在數據管理匯出完整 JSON 備份。')) return;
                await v4ApplyCloudBundle(data.payload, '雲端');
                v6SaveCloudMetaToConfig(config, data);
                renderV4CloudPane();
            } catch (err) {
                console.error(err);
                alert('下載失敗：' + err.message);
            }
        }

        async function v4TestCloudConnection() {
            if (!v5RequireSupabaseOwner()) return;
            try {
                const config = v4GetCloudConfig();
                if (!v4ConfigReady(config)) throw new Error('請先填寫 Supabase URL、anon key、Workspace Key');
                await v4CloudRequest('rpc/get_monthly_report_cloud_data', 'POST', { p_workspace_key: config.workspaceKey });
                showToast('Supabase 連線測試成功');
                renderV4CloudPane('connected');
            } catch (err) {
                console.error(err);
                alert('連線測試失敗：' + err.message + '\n\n請確認 SQL 已建立、URL/anon key 正確、RLS policy 已啟用。');

        function v4QueueAutoSave(reason = '修改') {
            if (V4_CLOUD_APPLYING || V4_CLOUD_SAVING) return;
            clearTimeout(V4_AUTO_SAVE_TIMER);
            V4_AUTO_SAVE_TIMER = null;
            const config = v4GetCloudConfig();
            if (!v4ConfigReady(config)) {
                v4SetCloudRuntimeStatus('本機已保存；雲端未配置，尚未同步。', 'warn');
                return;
            }
            if (!v5CurrentUser()) {
                v4SetCloudRuntimeStatus(`本機已保存；${reason}尚未上傳雲端，請登入後手動按「保存修改」。`, 'warn');
                return;
            }
            v4SetCloudRuntimeStatus(`${reason}已本機保存；不會自動上傳雲端，請需要時手動按「保存修改」。`, 'warn');
        }

        function v4IsUserEditingDraft() {
            const active = document.activeElement;
            if (active && (active.matches?.('input, textarea, select') || active.isContentEditable)) return true;
            const userDraftIds = ['v5-user-username', 'v5-user-display', 'v5-user-password'];
            if (userDraftIds.some(id => (document.getElementById(id)?.value || '').trim())) return true;
            const roleSelect = document.getElementById('v5-user-role');
            if (roleSelect && roleSelect.value && roleSelect.value !== 'operator') return true;
            return false;
        }

        async function v4AutoSyncLatestFromCloud(options = {}) {
            const silent = options.silent !== false;
            const deferMessage = '正在輸入未提交內容，已延後雲端同步，避免刷新頁面和跳走光標。';
            if (!options.force && v4IsUserEditingDraft()) {
                v4SetCloudRuntimeStatus(deferMessage, 'warn');
                return false;
            }
            if (V4_CLOUD_SAVING || V4_AUTO_SAVE_TIMER) return false;
            const config = v4GetCloudConfig();
            if (!v4ConfigReady(config)) {
                v4SetCloudRuntimeStatus('雲端未配置：請在數據管理填入 Supabase 設定。', 'warn');
                return false;
            }
            try {
                v4SetCloudRuntimeStatus(options.source || '正在自動同步雲端資料...', 'muted');
                const data = await v4CloudRequest('rpc/get_monthly_report_cloud_data', 'POST', { p_workspace_key: config.workspaceKey });
                if (!data || !data.payload) {
                    v4SetCloudRuntimeStatus('雲端尚無資料；請 owner 先保存一次。', 'warn');
                    return false;
                }
                // 即使請求發出時沒有在輸入，也可能在網路等待期間開始輸入；套用雲端前再檢查一次。
                if (!options.force && v4IsUserEditingDraft()) {
                    v4SetCloudRuntimeStatus(deferMessage, 'warn');
                    return false;
                }
                await v4ApplyCloudBundle(data.payload, '雲端最新', { silent: true });
                v6SaveCloudMetaToConfig(config, data);
                v4SetCloudRuntimeStatus(`已自動同步雲端：${v4FmtTime(config.lastSyncAt)}｜版本 ${config.cloudRevision || '—'}`, 'ok');
                renderV4CloudPane();
                renderV5SessionBar();
                if (!silent) showToast('已同步最新資料');
                return true;
            } catch (err) {
                console.error(err);
                v4SetCloudRuntimeStatus('自動同步失敗：' + err.message, 'error');
                if (!silent) alert('同步最新失敗：' + err.message);
                return false;
            }
        }

        async function v4CheckCloudRevision(options = {}) {
            const silent = options.silent !== false;
            if (V4_CLOUD_SAVING || V4_AUTO_SAVE_TIMER) return false;
            const config = v4GetCloudConfig();
            if (!v4ConfigReady(config)) return false;
            try {
                const data = await v4CloudRequest('rpc/get_monthly_report_cloud_data', 'POST', { p_workspace_key: config.workspaceKey });
                if (!data || !data.payload) return false;
                const remoteRev = Number(data.revision);
                const localRev = Number(config.cloudRevision);
                const remoteTime = data.updated_at || '';
                const localTime = config.lastCloudUpdatedAt || '';
                const hasNewRevision = Number.isFinite(remoteRev) && Number.isFinite(localRev) && remoteRev > localRev;
                const hasNewTime = !Number.isFinite(remoteRev) && remoteTime && localTime && remoteTime !== localTime;
                if (hasNewRevision || hasNewTime) {
                    const who = data.updated_by ? `，最後保存者：${data.updated_by}` : '';
                    const rev = Number.isFinite(remoteRev) ? `版本 ${remoteRev}` : '新版本';
                    v4SetCloudRuntimeStatus(`雲端有${rev}${who}。為避免打斷輸入，系統沒有自動刷新；請需要時按「同步最新」。`, 'warn');
                    return true;
                }
                if (!silent) v4SetCloudRuntimeStatus(`已檢查雲端：目前沒有新版本｜本機版本 ${config.cloudRevision || '—'}`, 'ok');
                return false;
            } catch (err) {
                console.warn('cloud revision check failed', err);
                if (!silent) v4SetCloudRuntimeStatus('雲端版本檢查失敗：' + err.message, 'error');
                return false;
            }
        }

        async function v4AutoSyncOnStartup() {
            if (V4_STARTUP_SYNC_DONE) return;
            V4_STARTUP_SYNC_DONE = true;
            const config = v4GetCloudConfig();
            if (config.autoSyncOnOpen === false) return;
            await v4AutoSyncLatestFromCloud({ silent: true, source: '打開系統，自動同步雲端資料...' });
        }

                'records:detentions': '資料記錄：PSC 滯留', 'records:actions': '資料記錄：行動項'

        function v6ClearLockUi() {
            const banner = document.getElementById('v6-lock-banner');
            if (banner) banner.remove();
            document.querySelectorAll('[data-v6-lock-disabled="1"]').forEach(el => {
                el.disabled = el.dataset.v6PrevDisabled === '1';
                delete el.dataset.v6LockDisabled;
                delete el.dataset.v6PrevDisabled;
            });
            document.querySelectorAll('[data-v6-lock-contenteditable]').forEach(el => {
                el.setAttribute('contenteditable', el.dataset.v6LockContenteditable || 'true');
                delete el.dataset.v6LockContenteditable;
            });
        }

        function v6ApplyLockUi(result) {
            v6ClearLockUi();
            if (!result || result.ok) {
                V6_LOCK_BLOCKED = false;
                V6_LOCK_OWNER_TEXT = '';
                return;
            }
            V6_LOCK_BLOCKED = true;
            V6_LOCK_OWNER_TEXT = result.locked_by_name || result.locked_by || '其他使用者';
            const sectionKey = result.section_key || v6CurrentSectionKey();
            const label = v6SectionLabel(sectionKey);
            const banner = document.createElement('div');
            banner.id = 'v6-lock-banner';
            banner.className = 'no-print';
            banner.style.cssText = 'margin:8px 12px;padding:10px 12px;border:1px solid #f59e0b;background:#fffbeb;color:#92400e;border-radius:10px;font-weight:800;font-size:13px;';
            banner.textContent = `${label} 正由 ${V6_LOCK_OWNER_TEXT} 編輯，暫時只讀。請稍後或請對方保存/離開此區塊。`;
            document.getElementById('v1TabsBar')?.insertAdjacentElement('afterend', banner);
            const root = v6SectionRoot(sectionKey);
            root?.querySelectorAll('input, textarea, select, button').forEach(el => {
                if (el.closest('.v5-session-bar') || el.closest('#v6-lock-banner')) return;
                el.dataset.v6PrevDisabled = el.disabled ? '1' : '0';
                el.disabled = true;
                el.dataset.v6LockDisabled = '1';
            });
            root?.querySelectorAll('[contenteditable="true"]').forEach(el => {
                el.dataset.v6LockContenteditable = el.getAttribute('contenteditable') || 'true';
                el.setAttribute('contenteditable', 'false');
            });
        }

        async function v6ReleaseCurrentLock() {
            const config = v4GetCloudConfig();
            const actor = v6CurrentActor();
            const section = V6_ACTIVE_LOCK_SECTION;
            if (!section || !v4ConfigReady(config)) return;
            try {
                await v4CloudRequest('rpc/release_monthly_report_edit_lock', 'POST', { p_workspace_key: config.workspaceKey, p_section_key: section, p_locked_by: actor.id });
            } catch (err) {
                console.warn('release lock failed', err);
            }
            if (V6_ACTIVE_LOCK_SECTION === section) V6_ACTIVE_LOCK_SECTION = '';
        }

        async function v6ClaimCurrentSectionLock(options = {}) {
            const user = v5CurrentUser();
            const config = v4GetCloudConfig();
            const section = v6CurrentSectionKey();
            if (!user || !v4ConfigReady(config) || !section) {
                v6ApplyLockUi({ ok: true });
                return true;
            }
            const actor = v6CurrentActor();
            try {
                const data = await v4CloudRequest('rpc/claim_monthly_report_edit_lock', 'POST', {
                    p_workspace_key: config.workspaceKey,
                    p_section_key: section,
                    p_locked_by: actor.id,
                    p_locked_by_name: actor.name,
                    p_ttl_seconds: 75
                });
                v6ApplyLockUi(data || { ok: true });
                if (data && data.ok) {
                    V6_ACTIVE_LOCK_SECTION = section;
                    if (!options.silent) v4SetCloudRuntimeStatus(`${v6SectionLabel(section)} 已取得編輯鎖，可安全修改。`, 'ok');
                    clearInterval(V6_LOCK_TIMER);
                    V6_LOCK_TIMER = setInterval(() => v6ClaimCurrentSectionLock({ silent: true }), 30000);
                    return true;
                }
                v4SetCloudRuntimeStatus(`${v6SectionLabel(section)} 被 ${data.locked_by_name || data.locked_by || '其他使用者'} 鎖定，暫時只讀。`, 'warn');
                return false;
            } catch (err) {
                console.error(err);
                v4SetCloudRuntimeStatus('V6 區塊鎖不可用：請先在 Supabase 執行 docs/supabase-schema-v6.sql。', 'error');
                return false;
            }
        }

        function v6SetupEditLockGuards() {
            if (window.__v6EditLockGuardsReady) return;
            window.__v6EditLockGuardsReady = true;
            const block = (event) => {
                if (!V6_LOCK_BLOCKED) return;
                const root = v6SectionRoot();
                if (root && root.contains(event.target)) {
                    event.preventDefault();
                    event.stopPropagation();
                    showToast(`此區塊正由 ${V6_LOCK_OWNER_TEXT || '其他使用者'} 編輯，暫時只讀`);
                }
            };
            ['beforeinput','input','change','paste','drop'].forEach(type => document.addEventListener(type, block, true));
            window.addEventListener('beforeunload', () => {
                const config = v4GetCloudConfig();
                const actor = v6CurrentActor();
                if (!V6_ACTIVE_LOCK_SECTION || !v4ConfigReady(config)) return;
                try {
                    const payload = JSON.stringify({ p_workspace_key: config.workspaceKey, p_section_key: V6_ACTIVE_LOCK_SECTION, p_locked_by: actor.id });
                    fetch(`${config.supabaseUrl}/rest/v1/rpc/release_monthly_report_edit_lock`, {
                        method: 'POST', keepalive: true,
                        headers: { 'apikey': config.anonKey, 'Authorization': 'Bearer ' + config.anonKey, 'Content-Type': 'application/json' },
                        body: payload
                    });
                } catch {}
            });
        }

        function v5GetFormDrafts() {

            if (!el || !el.id) return '';

            if (['file','hidden','button','submit','reset','color'].includes(type)) return '';

            if (el.disabled || el.readOnly) return '';

            const drafts = v5GetFormDrafts();
            drafts[key] = { value: el.value ?? '', at: new Date().toISOString() };
            v5SetFormDrafts(drafts);
            el.dataset.v5DraftTouched = '1';
        }
        function v5RestoreFormDrafts(scope = document) {
            const drafts = v5GetFormDrafts();
            scope.querySelectorAll?.('input, textarea, select').forEach(el => {
                const key = v5DraftKeyForElement(el);
                if (!key || !drafts[key] || el.dataset.v5DraftTouched === '1') return;
                el.value = drafts[key].value ?? '';
                el.dataset.v5DraftRestored = '1';

        function v5CaptureCloudPaneInputState(root) {
            const active = document.activeElement;
            const isDraftField = active && root?.contains(active) && active.matches?.('input, textarea, select');
            const state = { values: {}, activeId: '', selectionStart: null, selectionEnd: null };
            root?.querySelectorAll?.('input, textarea, select').forEach(el => {
                if (el.id) state.values[el.id] = el.value ?? '';
            });
            if (isDraftField && active.id) {
                state.activeId = active.id;
                try {
                    state.selectionStart = active.selectionStart;
                    state.selectionEnd = active.selectionEnd;
                } catch {}
            }
            return state;
        }
        function v5RestoreCloudPaneInputState(root, state) {
            if (!state || !root) return;
            Object.entries(state.values || {}).forEach(([id, value]) => {
                const el = root.querySelector(`#${CSS.escape(id)}`);
                if (el && el.matches?.('input, textarea, select')) el.value = value;
            });
            if (state.activeId) {
                const active = root.querySelector(`#${CSS.escape(state.activeId)}`);
                if (active && active.matches?.('input, textarea, select')) {
                    active.focus({ preventScroll: true });
                    try {
                        if (Number.isFinite(state.selectionStart) && Number.isFinite(state.selectionEnd) && typeof active.setSelectionRange === 'function') {
                            active.setSelectionRange(state.selectionStart, state.selectionEnd);
                        }
                    } catch {}
                }
            }
        }

        }
        function v5SetUsers(users) {
            localStorage.setItem(V5_USERS_KEY, JSON.stringify(Array.isArray(users) ? users : []));
            renderV5SessionBar();
        }
        function v5CurrentUser() {
            try { return JSON.parse(sessionStorage.getItem(V5_SESSION_KEY) || 'null'); } catch { return null; }
        }
        function v5SetSession(user) {
            if (user) sessionStorage.setItem(V5_SESSION_KEY, JSON.stringify({ username: user.username, displayName: user.displayName || user.username, role: user.role || 'operator' }));
            else sessionStorage.removeItem(V5_SESSION_KEY);
            renderV5SessionBar();
            renderTable();
            if (document.getElementById('v1-pane-cloud')?.classList.contains('active') && !v5CanManageData() && v5GetUsers().length > 0) {
                switchV1Tab('editor');
            }
        }
        function v5IsOwner() { return v5CurrentUser()?.role === 'owner'; }
        function v5IsAdmin() { const r = v5CurrentUser()?.role; return r === 'owner' || r === 'admin'; }
        function v5CanManageData() { return v5GetUsers().length === 0 || v5IsAdmin(); }
        function v5CanManageSupabaseConfig() { return v5GetUsers().length === 0 || v5IsOwner(); }
        function v5RequireSupabaseOwner(msg = '只有 owner 可以查看或修改 Supabase 設定。') { if (v5CanManageSupabaseConfig()) return true; alert(msg); return false; }
        function v5RequireOwner(msg = '只有 owner 可以執行此操作。') { if (v5IsOwner()) return true; alert(msg); return false; }
        function v5RequireLogin(msg = '請先登入。') { if (v5CurrentUser()) return true; alert(msg); return false; }
        async function v5HashPassword(password) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(String(password || '')));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }
        function v5SafeUser(u) {
            return {
                username: String(u.username || '').trim(),
                displayName: String(u.displayName || u.username || '').trim(),
                role: ['owner','admin','operator'].includes(u.role) ? u.role : 'operator',
                passwordHash: String(u.passwordHash || ''),
                createdAt: u.createdAt || new Date().toISOString()
            };
        }
        async function v5AddOrUpdateUserFromForm() {
            if (!v5CanManageData()) return alert('您無權訪問數據管理。');
            const users = v5GetUsers();
            const username = (document.getElementById('v5-user-username')?.value || '').trim();
            const displayName = (document.getElementById('v5-user-display')?.value || '').trim() || username;
            const password = document.getElementById('v5-user-password')?.value || '';
            let role = document.getElementById('v5-user-role')?.value || 'operator';
            if (!username || !password) return alert('請填寫用戶名和密碼。');
            const idx = users.findIndex(u => u.username === username);
            const existing = idx >= 0 ? users[idx] : null;
            const wasFirstUser = users.length === 0;
            if (wasFirstUser) role = 'owner';
            if (!wasFirstUser && !v5IsOwner()) {
                if (role === 'owner') return alert('只有 owner 可以新增或設定 owner。');
                if (existing && existing.role === 'owner') return alert('只有 owner 可以修改 owner 帳號。');
            }
            if (!wasFirstUser && role === 'owner' && users.some(u => u.role === 'owner' && u.username !== username)) return alert('目前僅允許一個 owner。如需更換 owner 用戶名，請先由 owner 匯出備份並按流程重設。');
            const passwordHash = await v5HashPassword(password);
            const next = v5SafeUser({ username, displayName, role, passwordHash, createdAt: existing ? existing.createdAt : new Date().toISOString() });
            if (idx >= 0) users[idx] = next; else users.push(next);
            v5SetUsers(users);
            v5ClearUserAdminDraft();
            if (wasFirstUser) v5SetSession(next);
            showToast(wasFirstUser ? 'Owner 已建立，請手動按「保存修改」上傳雲端' : '用戶已本機保存，請手動按「保存修改」上傳雲端');
            v4QueueAutoSave('用戶權限');
            renderV4CloudPane();
        }
        function v5DeleteUser(username) {
            if (!v5IsOwner()) return alert('只有 owner 可以刪除用戶。');
            const users = v5GetUsers();
            const target = users.find(u => u.username === username);
            if (!target) return;
            if (target.role === 'owner') return alert('不能刪除 owner。');
            if (!confirm(`確定刪除用戶 ${username}？`)) return;
            v5SetUsers(users.filter(u => u.username !== username));
            v4QueueAutoSave('用戶權限');
            renderV4CloudPane();
        }
        async function v5Login() {
            const username = (document.getElementById('v5-login-username')?.value || '').trim();
            const password = document.getElementById('v5-login-password')?.value || '';
            const users = v5GetUsers();
            const hash = await v5HashPassword(password);
            const user = users.find(u => u.username === username && u.passwordHash === hash);
            if (!user) return alert('用戶名或密碼不正確。若這是新瀏覽器，請先點「同步最新」。');
            v5SetSession(user);
            showToast(`已登入：${user.displayName || user.username}`);
        }
        function v5Logout() { v5SetSession(null); showToast('已登出'); }
        async function v5SyncLatest() {
            await v4AutoSyncLatestFromCloud({ silent: false, source: '正在同步最新雲端資料...' });
        }
        async function v5SaveChangesToCloud() {
            if (!v5RequireLogin('請先登入後再保存修改。')) return;
            clearTimeout(V4_AUTO_SAVE_TIMER);
            V4_AUTO_SAVE_TIMER = null;
            await v4UploadToCloud({ silent: false, reason: '手動保存' });
            renderV5SessionBar();
        }

        function renderV5SessionBar() {
            const root = document.getElementById('v5TopStatus');
            if (!root) return;
            const user = v5CurrentUser();
            const users = v5GetUsers();
            const configReady = v4ConfigReady();
            root.innerHTML = user ? `
                <div class="v5-session-bar">
                    <span class="v5-role-pill"><i class="fas fa-user-shield"></i>${v2RecordText(user.displayName || user.username)}｜${v5RoleLabel(user.role)}</span>
                    <button class="v5-sync-btn" onclick="v5SyncLatest()"><i class="fas fa-rotate mr-1"></i>同步最新</button>
                    <button class="v5-sync-btn" onclick="v5SaveChangesToCloud()"><i class="fas fa-cloud-arrow-up mr-1"></i>保存修改</button>
                    <button class="v5-sync-btn" onclick="v5Logout()">登出</button>
                    ${v4CloudStatusHtml()}
                </div>` : `
                <div class="v5-session-bar">
                    <span class="v5-role-pill"><i class="fas fa-lock"></i>${users.length ? '未登入' : '尚未建立 owner'}</span>
                    <input id="v5-login-username" class="border border-sky-200 rounded px-2 py-1 text-xs" placeholder="用戶名">
                    <input id="v5-login-password" type="password" class="border border-sky-200 rounded px-2 py-1 text-xs" placeholder="密碼" onkeydown="if(event.key==='Enter') v5Login()">
                    <button class="v5-sync-btn" onclick="v5Login()">登入</button>
                    <button class="v5-sync-btn" onclick="v5SyncLatest()"><i class="fas fa-rotate mr-1"></i>同步最新</button>
                    ${v4CloudStatusHtml()}
                </div>`;
        }
        function v5UserAdminHtml() {
            const users = v5GetUsers();
            const canManage = v5CanManageData();
            if (!canManage && users.length) return `<div class="v1-empty-state">您無權訪問數據管理。請使用 owner 或管理員帳號登入。</div>`;
            const rows = users.map(u => `<tr><td>${v2RecordText(u.username)}</td><td>${v2RecordText(u.displayName)}</td><td>${v5RoleLabel(u.role)}</td><td>${u.role === 'owner' ? '<span class="text-slate-400">受保護</span>' : (v5IsOwner() ? `<button class="v1-small-btn v1-danger-btn" onclick="v5DeleteUser('${v1EscapeAttr(u.username)}')">刪除</button>` : '—')}</td></tr>`).join('') || `<tr><td colspan="4" class="text-center text-gray-400 py-3">尚未建立用戶。第一個用戶會自動成為 owner。</td></tr>`;
            const roleOptions = `<option value="operator">使用者</option><option value="admin">管理員</option>${v5IsOwner() || users.length===0 ? '<option value="owner">Owner</option>' : ''}`;
            return `
                <section class="v1-category-card">
                    <div class="v1-category-title mb-2">用戶與權限管理</div>
                    <div class="grid grid-cols-1 sm:grid-cols-4 gap-2 mb-2">
                        <input id="v5-user-username" class="border border-indigo-100 rounded px-2 py-1 text-sm" placeholder="用戶名">
                        <input id="v5-user-display" class="border border-indigo-100 rounded px-2 py-1 text-sm" placeholder="顯示名稱">
                        <input id="v5-user-password" type="password" class="border border-indigo-100 rounded px-2 py-1 text-sm" placeholder="密碼">
                        <select id="v5-user-role" class="border border-indigo-100 rounded px-2 py-1 text-sm">
                            ${roleOptions}
                        </select>
                    </div>
                    <div class="v1-action-row"><button class="v1-small-btn v1-primary-btn" onclick="v5AddOrUpdateUserFromForm()"><i class="fas fa-user-plus mr-1"></i>${users.length ? '新增 / 更新用戶' : '建立第一個 owner'}</button></div>
                    <div class="overflow-auto border border-slate-200 rounded-lg"><table style="table-layout:auto;"><thead><tr><th>用戶名</th><th>顯示名稱</th><th>權限</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table></div>
                    <div class="text-xs text-slate-500 mt-2">權限規則：owner 可管理 owner / 管理員 / 使用者；管理員只可新增或更新非 owner 用戶，不能新增、修改或升級 owner；所有已登入用戶可同步最新與保存修改。</div>
                </section>`;
        }

        // 覆蓋 V4 頁：改為 V5 數據管理
        renderV4CloudPane = function(testStatus = '') {
            const root = document.getElementById('v1-pane-cloud');
            if (!root) return;
            const inputState = v5CaptureCloudPaneInputState(root);
            const c = v4GetCloudConfig();
            const ready = v4ConfigReady(c);
            const canManage = v5CanManageData();
            const canManageSupabase = v5CanManageSupabaseConfig();
            const supabaseConfigHtml = canManageSupabase ? `
                        <section class="v1-category-card">
                            <div class="v1-category-title mb-2">Supabase 設定</div>
                            <label class="flex flex-col gap-1 text-xs font-bold text-slate-600 mb-2">Supabase Project URL
                                <input id="v4-supabase-url" class="border border-indigo-100 rounded px-2 py-1 text-sm" value="${v2RecordText(c.supabaseUrl)}" placeholder="https://xxxxx.supabase.co">
                            </label>
                            <label class="flex flex-col gap-1 text-xs font-bold text-slate-600 mb-2">Anon public key
                                <input id="v4-supabase-anon" class="border border-indigo-100 rounded px-2 py-1 text-sm" value="${v2RecordText(c.anonKey)}" placeholder="eyJhbGciOi...">
                            </label>
                            <label class="flex flex-col gap-1 text-xs font-bold text-slate-600 mb-2">Workspace Key
                                <input id="v4-workspace-key" class="border border-indigo-100 rounded px-2 py-1 text-sm" value="${v2RecordText(c.workspaceKey)}" placeholder="請生成或填入私密工作區 key">
                            </label>
                            <div class="v1-action-row">
                                <button class="v1-small-btn" onclick="v4GenerateWorkspaceKey()"><i class="fas fa-key mr-1"></i>生成 Key</button>
                                <button class="v1-small-btn v1-primary-btn" onclick="v4SaveCloudConfigFromForm()"><i class="fas fa-save mr-1"></i>保存設定</button>
                                <button class="v1-small-btn" onclick="v4TestCloudConnection()"><i class="fas fa-plug mr-1"></i>測試連線</button>
                            </div>
                            <div class="text-xs ${ready ? 'text-emerald-700' : 'text-rose-700'} font-bold">狀態：${ready ? '設定已填寫' : '尚未完成設定'} ${testStatus === 'connected' ? '｜剛剛測試成功' : ''}</div>
                        </section>` : '';
            root.innerHTML = `
                <div class="v1-page-card">
                    <h2 class="v1-page-title"><i class="fas fa-shield-halved mr-2"></i>數據管理</h2>
                    <div class="v1-page-subtitle">V6：雲端資料為準；保存前檢查雲端版本，區塊編輯會上鎖，避免多人同時覆蓋。</div>
                    ${!canManage && v5GetUsers().length ? '<div class="v1-empty-state">您無權訪問數據管理。請使用 owner 或管理員帳號登入。</div>' : `
                    <div class="v1-category-grid">
                        ${supabaseConfigHtml}
                        <section class="v1-category-card">
                            <div class="v1-category-title mb-2">同步操作</div>
                            <div class="text-xs text-slate-500 mb-2">手動模式：打開系統時自動同步一次；使用中只檢查雲端版本，不自動刷新；修改後只保存本機，請手動按「保存修改 / 上傳雲端」。</div>
                            <div class="v1-action-row">
                                <button class="v1-small-btn" onclick="v5SyncLatest()"><i class="fas fa-cloud-arrow-down mr-1"></i>同步最新 / 下載雲端</button>
                                <button class="v1-small-btn v1-primary-btn" onclick="v5SaveChangesToCloud()"><i class="fas fa-cloud-arrow-up mr-1"></i>保存修改 / 上傳雲端</button>
                            </div>
                            <div class="text-sm text-slate-600 leading-6"><div><b>最近同步：</b>${v4FmtTime(c.lastSyncAt)}</div><div><b>雲端更新：</b>${v4FmtTime(c.lastCloudUpdatedAt)}</div><div><b>雲端版本：</b>${c.cloudRevision || '尚未同步 V6'}</div><div><b>最後保存者：</b>${v2RecordText(c.lastUpdatedBy || '尚無')}</div></div>
                            <div class="v1-action-row mt-2"><button class="v1-small-btn" onclick="v4ExportLocalBundleJson()"><i class="fas fa-file-export mr-1"></i>匯出完整 JSON 備份</button><button class="v1-small-btn" onclick="document.getElementById('v4-bundle-import').click()"><i class="fas fa-file-import mr-1"></i>匯入完整 JSON 備份</button><input id="v4-bundle-import" type="file" accept=".json" class="hidden" onchange="v4ImportLocalBundleJson(event)"></div>
                        </section>
                    </div>
                    <div class="mt-3">${v5UserAdminHtml()}</div>
                    <div class="v1-note-box mt-3"><b>同步說明：</b>正式使用時 Supabase URL / anon public key / Workspace Key 應放在 <code>supabase-config.js</code>，大家打開同一網址會自動讀取同一份雲端資料。Workspace Key 仍需視為內部共享密鑰，請勿公開。</div>`}
                </div>`;
            setTimeout(() => {
                v5RestoreFormDrafts(root);
                v5RestoreCloudPaneInputState(root, inputState);
            }, 0);
        };


        window.onload = async function() {
            await initApp();
            setupV1Shell();
            v5SetupFormDraftPersistence();
            v6SetupEditLockGuards();
            await v4AutoSyncOnStartup();
            v4SetupAutoRefresh();
        };
    </script>
</body>
</html>
