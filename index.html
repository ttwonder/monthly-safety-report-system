<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月度安全會議報告 V6</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS for Excel Import/Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js 動態趨勢圖 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- 公開 Supabase 設定：只放 anon public key，不能放 service_role。 -->
    <script src="./supabase-config.js"></script>

    
    <!-- 系統保留節點 -->
    <script id="portable-data" type="application/json"></script>

    <!-- 數據條與卡片即時運算邏輯 -->
    <script>
        window.updateKpiCard = function(container) {
            if (!container) return;
            if (!container.classList.contains('kpi-card-container')) {
                container = container.closest('.kpi-card-container');
                if(!container) return;
            }
            
            const getVal = (selector) => {
                const targetEl = container.querySelector(selector);
                if(!targetEl) return NaN;
                return parseFloat(targetEl.textContent.replace(/[^0-9.-]/g, ''));
            };

            let min = getVal('.kpi-min');
            let max = getVal('.kpi-max');
            let current = getVal('.current-val');
            let target = getVal('.target-val');
            let avg = getVal('.avg-val');

            if(isNaN(min)) min = 0;
            if(isNaN(max)) max = 100;
            if(isNaN(current)) current = min;
            if(isNaN(target)) target = max;
            if(isNaN(avg)) avg = min;

            let range = max - min;
            if (range === 0) range = 1; 

            let currentPercent = ((current - min) / range) * 100;
            let targetPercent = ((target - min) / range) * 100;
            let avgPercent = ((avg - min) / range) * 100;

            currentPercent = Math.max(0, Math.min(100, currentPercent));
            targetPercent = Math.max(0, Math.min(100, targetPercent));
            avgPercent = Math.max(0, Math.min(100, avgPercent));

            const curMarker = container.querySelector('.current-marker');
            const tgtMarker = container.querySelector('.target-marker');
            const avgMarker = container.querySelector('.avg-marker');
            
            if(curMarker) curMarker.style.left = currentPercent + '%';
            if(tgtMarker) tgtMarker.style.left = targetPercent + '%';
            if(avgMarker) avgMarker.style.left = avgPercent + '%';
        };

        window.updateProgressCard = function(container) {
            if (!container) return;
            if (!container.classList.contains('progress-card-container')) {
                container = container.closest('.progress-card-container');
                if(!container) return;
            }
            
            const valEl = container.querySelector('.progress-val');
            if(!valEl) return;
            
            let progress = parseFloat(valEl.textContent.replace(/[^0-9.-]/g, ''));
            if(isNaN(progress)) progress = 0;
            progress = Math.max(0, Math.min(100, progress));

            const marker = container.querySelector('.progress-marker');
            const bar = container.querySelector('.progress-bar');
            
            if (marker) marker.style.left = progress + '%';
            if (bar) {
                bar.style.background = `linear-gradient(to right, #22c55e ${progress}%, #e2e8f0 ${progress}%)`;
            }
        };

        window.updateZoneCard = function(container) {
            if (!container) return;
            if (!container.classList.contains('zone-card-container')) {
                container = container.closest('.zone-card-container');
                if(!container) return;
            }
            
            const getVal = (selector) => {
                const targetEl = container.querySelector(selector);
                if(!targetEl) return NaN;
                return parseFloat(targetEl.textContent.replace(/[^0-9.-]/g, ''));
            };

            let min = getVal('.zone-min');
            let max = getVal('.zone-max');
            let lim1 = getVal('.zone-limit1');
            let limMid = getVal('.zone-limit-mid');
            let lim2 = getVal('.zone-limit2');
            let current = getVal('.current-val');

            if(isNaN(min)) min = 0;
            if(isNaN(max)) max = 5;
            if(isNaN(lim1)) lim1 = 1.45;
            if(isNaN(limMid)) limMid = 2.45;
            if(isNaN(lim2)) lim2 = 3.45;
            if(isNaN(current)) current = min;

            let range = max - min;
            if (range === 0) range = 1; 

            let p1 = ((lim1 - min) / range) * 100;
            let pMid = ((limMid - min) / range) * 100;
            let p2 = ((lim2 - min) / range) * 100;
            let curP = ((current - min) / range) * 100;

            p1 = Math.max(0, Math.min(100, p1));
            pMid = Math.max(0, Math.min(100, pMid));
            p2 = Math.max(p1, Math.min(100, p2)); 
            curP = Math.max(0, Math.min(100, curP));

            const bar = container.querySelector('.zone-bar');
            if (bar) {
                bar.style.background = `linear-gradient(to right, #22c55e 0%, #22c55e ${p1}%, #eab308 ${p1}%, #eab308 ${p2}%, #ef4444 ${p2}%, #ef4444 100%)`;
            }

            const l1El = container.querySelector('.zone-limit1');
            const lMidEl = container.querySelector('.zone-limit-mid');
            const l2El = container.querySelector('.zone-limit2');
            const marker = container.querySelector('.zone-marker');

            if (l1El) l1El.style.left = p1 + '%';
            if (lMidEl) lMidEl.style.left = pMid + '%';
            if (l2El) l2El.style.left = p2 + '%';
            if (marker) marker.style.left = curP + '%';
        };

        window.addEventListener('DOMContentLoaded', () => {
            const observer = new MutationObserver((mutations) => {
                let cardsToUpdate = new Set();
                let chartsToUpdate = false;
                
                mutations.forEach(m => {
                    let target = m.target;
                    if (target.nodeType === 3) target = target.parentNode; 
                    if (target && target.closest) {
                        let kpiCard = target.closest('.kpi-card-container');
                        if (kpiCard) cardsToUpdate.add(kpiCard);
                        let progCard = target.closest('.progress-card-container');
                        if (progCard) cardsToUpdate.add(progCard);
                        let zoneCard = target.closest('.zone-card-container');
                        if (zoneCard) cardsToUpdate.add(zoneCard);
                        
                        // 監聽圖表表格變化
                        if (target.closest('.chart-data-table') && m.type === 'characterData') {
                            chartsToUpdate = true;
                        }
                    }
                });
                
                cardsToUpdate.forEach(card => {
                    if (card.classList.contains('kpi-card-container')) window.updateKpiCard(card);
                    if (card.classList.contains('progress-card-container')) window.updateProgressCard(card);
                    if (card.classList.contains('zone-card-container')) window.updateZoneCard(card);
                });
                
                if (chartsToUpdate) {
                    if(window._chartUpdateTimeout) clearTimeout(window._chartUpdateTimeout);
                    window._chartUpdateTimeout = setTimeout(window.renderAllCharts, 300);
                }
            });
            
            setTimeout(() => {
                const tableBody = document.getElementById('tableBody');
                if (tableBody) {
                    observer.observe(tableBody, { childList: true, subtree: true, characterData: true });
                }
                window.renderAllCharts(); // 初始渲染所有圖表
            }, 1000);
            
            document.addEventListener('keyup', (e) => {
                if (e.target && e.target.classList && e.target.classList.contains('editable-div')) {
                    e.target.querySelectorAll('.kpi-card-container').forEach(card => window.updateKpiCard(card));
                    e.target.querySelectorAll('.progress-card-container').forEach(card => window.updateProgressCard(card));
                    e.target.querySelectorAll('.zone-card-container').forEach(card => window.updateZoneCard(card));
                }
            });
        });

        document.addEventListener('input', function(e) {
            if (e.target.classList.contains('kpi-min') || 
                e.target.classList.contains('kpi-max') || 
                e.target.classList.contains('current-val') || 
                e.target.classList.contains('target-val') ||
                e.target.classList.contains('avg-val')) {
                window.updateKpiCard(e.target);
            }
            if (e.target.classList.contains('progress-val')) {
                window.updateProgressCard(e.target);
            }
            if (e.target.classList.contains('zone-min') || 
                e.target.classList.contains('zone-max') || 
                e.target.classList.contains('zone-limit1') || 
                e.target.classList.contains('zone-limit-mid') || 
                e.target.classList.contains('zone-limit2') || 
                e.target.classList.contains('current-val')) {
                window.updateZoneCard(e.target);
            }

            // 【修正 2】：防抖延遲自動保存機制
            // 解決使用者輸入後未觸發 blur 離開編輯區，直接關閉視窗導致未儲存的問題
            clearTimeout(window._globalInputSaveTimer);
            window._globalInputSaveTimer = setTimeout(() => {
                triggerAutoSave(e.target);
                setTimeout(preserveTrendAnchor, 0);
            }, 800);
        });

        window.toggleAvg = function(btn) {
            const container = btn.closest('.kpi-card-container');
            if(container) {
                container.classList.toggle('show-avg');
                window.updateKpiCard(container);
                triggerAutoSave(container);
            }
        };

        // 防止 highlight-val 內按 Enter 換行破壞版面
        document.addEventListener('keydown', (e) => {
            const isUndo = (e.ctrlKey || e.metaKey) && !e.shiftKey && e.key.toLowerCase() === 'z';
            const isRedo = (e.ctrlKey || e.metaKey) && (e.key.toLowerCase() === 'y' || (e.shiftKey && e.key.toLowerCase() === 'z'));
            if (isUndo || isRedo) {
                const editable = getActiveEditableFromSelection?.() || document.activeElement?.closest?.('.editable-div, [contenteditable="true"]');
                if (editable) {
                    e.preventDefault();
                    document.execCommand(isUndo ? 'undo' : 'redo', false, null);
                    cleanupEditable(editable.closest('.editable-div') || editable);
                    triggerAutoSave(editable.closest('.editable-div') || editable);
                    saveRangeFromSelection();
                    return;
                }
            }
            if (e.key === 'Enter') {
                const sel = window.getSelection();
                if (sel.rangeCount > 0) {
                    let node = sel.getRangeAt(0).startContainer;
                    if (node.nodeType === 3) node = node.parentNode;
                    if (node && node.closest) {
                        if (node.closest('.highlight-val')) {
                            e.preventDefault();
                        }
                        // 阻止在趨勢圖表格內按 Enter 換行，防止結構破壞
                        if (node.closest('.chart-data-table th') || node.closest('.chart-data-table td')) {
                            e.preventDefault();
                            node.closest('.chart-data-table th, .chart-data-table td').blur();
                        }
                    }
                }
            }
        });

        // --- 核心：提示工具 ---
        function showToast(msg) {
            const toast = document.getElementById('saveToast');
            document.getElementById('saveToastMsg').innerText = msg;
            toast.classList.add('toast-show');
            setTimeout(() => { toast.classList.remove('toast-show'); }, 3000);
        }

        // === Chart.js 趨勢圖專屬邏輯 ===
        const chartInstances = {}; // 儲存所有的圖表實例
        const colorPalette = ['#4f46e5', '#10b981', '#f43f5e', '#f59e0b', '#8b5cf6']; // 藍, 綠, 紅, 橘, 紫

        function sanitizeTrendChartHtml(html) {
            if (!html || !String(html).includes('trend-chart-container')) return html;
            const template = document.createElement('template');
            template.innerHTML = String(html);
            template.content.querySelectorAll('.trend-chart-container').forEach(container => {
                const canvasArea = container.querySelector('.chart-canvas-area');
                if (canvasArea) {
                    const h = parseInt(canvasArea.style.height || canvasArea.getAttribute('data-chart-height') || '200', 10) || 200;
                    canvasArea.style.height = Math.max(100, h) + 'px';
                    canvasArea.style.minWidth = '0';
                    canvasArea.style.position = 'relative';
                    canvasArea.style.flex = canvasArea.style.flex || '1 1 auto';
                }
                container.querySelectorAll('canvas.trend-canvas').forEach(canvas => {
                    canvas.removeAttribute('width');
                    canvas.removeAttribute('height');
                    canvas.removeAttribute('style');
                    canvas.removeAttribute('data-chart-id');
                    canvas.removeAttribute('role');
                    canvas.removeAttribute('aria-label');
                });
            });
            return template.innerHTML;
        }

        function sanitizeReportDataForStorage(data) {
            if (!Array.isArray(data)) return data;
            data.forEach(item => {
                if (!item || !Array.isArray(item.columns)) return;
                item.columns = item.columns.map(col => sanitizeTrendChartHtml(col || ''));
            });
            return data;
        }

        function prepareTrendChartForRender(container) {
            if (!container) return null;
            const canvasArea = container.querySelector('.chart-canvas-area');
            const canvas = container.querySelector('.trend-canvas');
            const table = container.querySelector('.chart-data-table');
            if (!canvas || !table || !canvasArea) return null;

            const h = parseInt(canvasArea.style.height || canvasArea.getAttribute('data-chart-height') || '200', 10) || 200;
            canvasArea.style.height = Math.max(100, h) + 'px';
            canvasArea.style.minWidth = '120px';
            canvasArea.style.position = 'relative';
            canvasArea.style.flex = canvasArea.style.flex || '1 1 auto';

            // Chart.js 會在 canvas 上寫入即時 width/height/style。這些值若被保存為 0，重開後就會空白。
            // 每次重繪前都清掉舊尺寸，讓 Chart.js 依目前可見容器重新計算。
            canvas.removeAttribute('width');
            canvas.removeAttribute('height');
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.display = 'block';
            canvas.style.boxSizing = 'border-box';

            return { canvas, table, canvasArea };
        }

        function redrawChartsWhenVisible() {
            if (window._redrawChartsWhenVisibleTimer) clearTimeout(window._redrawChartsWhenVisibleTimer);
            window._redrawChartsWhenVisibleTimer = setTimeout(() => {
                window.renderAllCharts?.();
                setTimeout(() => window.renderAllCharts?.(), 250);
            }, 80);
        }

        window.renderAllCharts = function() {
            // 安全防護：如果 Chart 尚未載入，稍後重試
            if (typeof Chart === 'undefined') {
                setTimeout(window.renderAllCharts, 500);
                return;
            }

            document.querySelectorAll('.trend-chart-container').forEach(container => {
                const prepared = prepareTrendChartForRender(container);
                if (!prepared) return;
                const { canvas, table, canvasArea } = prepared;
                const areaRect = canvasArea.getBoundingClientRect();
                if (areaRect.width < 10 || areaRect.height < 10) {
                    const existingHiddenChart = typeof Chart.getChart === 'function' ? Chart.getChart(canvas) : null;
                    if (existingHiddenChart) existingHiddenChart.destroy();
                    return;
                }

                // 【強制修復舊版表格編輯屬性防錯亂】
                if(table.getAttribute('contenteditable') === 'true') {
                    table.setAttribute('contenteditable', 'false');
                    table.querySelectorAll('th, td').forEach(cell => {
                        cell.setAttribute('contenteditable', 'true');
                        cell.style.whiteSpace = 'nowrap';
                    });
                }

                const labels = [];
                const datasetsData = [];
                const seriesNames = [];
                
                // 解析表頭 (取得指標名稱)
                const ths = table.querySelectorAll('thead tr th');
                for(let i=1; i<ths.length; i++) {
                    seriesNames.push(ths[i].innerText.trim());
                    datasetsData.push([]); 
                }

                // 解析資料列
                const trs = table.querySelectorAll('tbody tr');
                trs.forEach(tr => {
                    const tds = tr.querySelectorAll('td');
                    if(tds.length > 0) {
                        labels.push(tds[0].innerText.trim()); // X軸週期名稱
                        for(let i=1; i<tds.length; i++) {
                            // 確保不會超出定義的指標數量
                            if (i - 1 < datasetsData.length) {
                                const val = parseFloat(tds[i].innerText.replace(/[^0-9.-]/g, ''));
                                datasetsData[i-1].push(isNaN(val) ? 0 : val);
                            }
                        }
                    }
                });

                // 建立 Chart.js 要求的 datasets 格式
                const datasets = seriesNames.map((name, index) => {
                    const color = colorPalette[index % colorPalette.length];
                    return {
                        label: name,
                        data: datasetsData[index],
                        borderColor: color,
                        backgroundColor: color + '33', // 帶透明度的背景
                        borderWidth: 1.5, // 【需求】：細線
                        pointRadius: 4,
                        pointBackgroundColor: color,
                        tension: 0.3, // 曲線平滑度
                        fill: false
                    };
                });

                // 取得唯一 ID 或建立一個
                let chartId = canvas.getAttribute('data-chart-id');
                if(!chartId) {
                    chartId = 'chart_' + Math.random().toString(36).substr(2, 9);
                    canvas.setAttribute('data-chart-id', chartId);
                }

                // 如果已經存在舊圖表，先銷毀它；也清理 Chart.js 綁在 canvas 上的舊實例。
                const attachedChart = typeof Chart.getChart === 'function' ? Chart.getChart(canvas) : null;
                if (attachedChart) attachedChart.destroy();
                if(chartInstances[chartId]) {
                    try { chartInstances[chartId].destroy(); } catch {}
                }

                // 繪製新圖表
                chartInstances[chartId] = new Chart(canvas, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: datasets
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: { duration: 0 }, // 關閉動畫確保編輯順暢
                        layout: { padding: { top: 12, right: 10 } }, // 留白：防止頂部標籤與右側節點被截斷
                        plugins: {
                            legend: {
                                position: 'top',
                                labels: { boxWidth: 12, usePointStyle: false, font: { size: 10 } }
                            }
                        },
                        scales: {
                            y: { 
                                beginAtZero: true,
                                grid: { color: '#f1f5f9' },
                                ticks: { font: { size: 10 } }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { font: { size: 10 } }
                            }
                        }
                    },
                    plugins: [{
                        id: 'customDataLabels',
                        afterDatasetsDraw(chart) {
                            const { ctx } = chart;
                            chart.data.datasets.forEach((dataset, i) => {
                                const meta = chart.getDatasetMeta(i);
                                if (meta.hidden) return;
                                meta.data.forEach((element, index) => {
                                    // 繪製標籤
                                    ctx.fillStyle = dataset.borderColor; // 使用與折線相同的顏色
                                    ctx.font = 'bold 6px sans-serif'; // 大小 6px
                                    ctx.textAlign = 'center';
                                    ctx.textBaseline = 'bottom';
                                    const dataString = dataset.data[index];
                                    const position = element.tooltipPosition();
                                    // Y軸減去4，確保文字在節點正上方
                                    ctx.fillText(dataString, position.x, position.y - 4);
                                });
                            });
                        }
                    }]
                });
                setTimeout(() => {
                    try { chartInstances[chartId]?.resize(); } catch {}
                }, 0);
            });
            setTimeout(preserveTrendAnchor, 0);
        };

        // 監聽列印事件，強制重繪圖表解決出框與自適應延遲問題
        window.addEventListener('beforeprint', () => {
            for (let id in chartInstances) {
                if (chartInstances[id]) chartInstances[id].resize();
            }
        });
        window.addEventListener('afterprint', () => {
            setTimeout(() => {
                for (let id in chartInstances) {
                    if (chartInstances[id]) chartInstances[id].resize();
                }
            }, 100);
        });

        // 增加一個週期 (列)
        window.addChartRow = function(btn) {
            const container = btn.closest('.trend-chart-container');
            const table = container.querySelector('.chart-data-table');
            const tbody = table.querySelector('tbody') || table;
            const headerRow = table.rows[0];
            const colCount = headerRow.cells.length; // 改用 cells 精準抓取欄位數
            
            const tr = document.createElement('tr');
            let innerHTML = '<td contenteditable="true" style="border: 1px solid #cbd5e1; padding: 1px; text-align: center; outline: none; white-space: nowrap; font-size: 6px;">新週期</td>';
            for(let i = 1; i < colCount; i++) {
                innerHTML += `<td contenteditable="true" style="border: 1px solid #cbd5e1; padding: 1px; text-align: center; outline: none; white-space: nowrap; font-size: 6px;" class="chart-val">0</td>`;
            }
            tr.innerHTML = innerHTML;
            tbody.appendChild(tr);
            window.renderAllCharts();
            triggerAutoSave(btn);
        };

        // 減少最後一個週期 (列)
        window.removeChartRow = function(btn) {
            const container = btn.closest('.trend-chart-container');
            const table = container.querySelector('.chart-data-table');
            if(table.rows.length > 2) { // 至少保留標題列與一個數據列
                table.deleteRow(-1);
                window.renderAllCharts();
                triggerAutoSave(btn);
            } else {
                showToast("最少需保留一個週期數據");
            }
        };

        // 增加一個指標 (欄)
        window.addChartSeries = function(btn) {
            const container = btn.closest('.trend-chart-container');
            const table = container.querySelector('.chart-data-table');
            const headerRow = table.rows[0]; // 嚴格綁定表格第一列
            
            if(headerRow.cells.length >= 6) {
                showToast("最多支援 5 種指標比較");
                return;
            }

            const nextIdx = headerRow.cells.length; 
            const th = document.createElement('th');
            th.setAttribute('contenteditable', 'true');
            // 【縮小一半】: padding:1px, font-size:6px, min-width:15px
            th.style.cssText = "border: 1px solid #cbd5e1; background: #f1f5f9; padding: 1px; text-align: center; font-weight: bold; color: #475569; outline: none; min-width: 15px; white-space: nowrap; font-size: 6px;";
            th.innerText = `指標 ${nextIdx}`;
            headerRow.appendChild(th);

            // 嚴格對每一列(包含隱藏列)同步新增儲存格，防止錯位
            for(let i = 1; i < table.rows.length; i++) {
                const tr = table.rows[i];
                const td = document.createElement('td');
                td.setAttribute('contenteditable', 'true');
                // 【縮小一半】: padding:1px, font-size:6px
                td.style.cssText = "border: 1px solid #cbd5e1; padding: 1px; text-align: center; outline: none; white-space: nowrap; font-size: 6px;";
                td.className = "chart-val";
                td.innerText = "0";
                tr.appendChild(td);
            }

            window.renderAllCharts();
            triggerAutoSave(btn);
        };

        // 減少最後一個指標 (欄)
        window.removeChartSeries = function(btn) {
            const container = btn.closest('.trend-chart-container');
            const table = container.querySelector('.chart-data-table');
            const headerRow = table.rows[0];
            
            if(headerRow.cells.length > 2) { // 至少保留一個指標 (週期 + 指標1 = 2)
                for(let i = 0; i < table.rows.length; i++) {
                    const tr = table.rows[i];
                    if(tr.cells.length > 1) {
                        tr.deleteCell(-1); // 嚴格刪除每一列的最後一格
                    }
                }
                window.renderAllCharts();
                triggerAutoSave(btn);
            } else {
                showToast("最少需保留一種指標比較");
            }
        };

        // 設定圖表高度
        window.setChartHeight = function(inputEl) {
            const val = parseInt(inputEl.value);
            if(isNaN(val) || val < 100) return;
            const container = inputEl.closest('.trend-chart-container');
            const canvasArea = container.querySelector('.chart-canvas-area');

        // --- 全新升級：插入多維度動態趨勢圖 ---
        function insertTrendChart() {
            const layout = layoutStyle({ inlineWidth: '48%' });
            const html = `
            <div class="trend-chart-container ${layout.extraClass}" data-layout="${layout.dataLayout}" data-trend-chart="1" contenteditable="false" style="border: 2px solid #cbd5e1; padding: 8px; border-radius: 6px; background-color: #ffffff; ${layout.style}; break-inside: avoid; page-break-inside: avoid;">

                        <button contenteditable="false" onclick="window.addChartSeries(this)" class="toolbar-btn !bg-indigo-50 text-indigo-700 !px-1.5 !h-5" title="增加一條數據線"><i class="fas fa-plus text-[10px]"></i></button>
                        <button contenteditable="false" onclick="window.removeChartSeries(this)" class="toolbar-btn !bg-rose-50 text-rose-600 !px-1.5 !h-5" title="刪除最後一條數據線"><i class="fas fa-minus text-[10px]"></i></button>
                        
                        <span style="width:1px; height:12px; background:#cbd5e1; margin:0 4px;"></span>
                        
                        <span style="font-size: 10px; color:#64748b; font-weight:bold; margin-right:2px;">週期(點)</span>
                        <button contenteditable="false" onclick="window.addChartRow(this)" class="toolbar-btn !bg-emerald-50 text-emerald-700 !px-1.5 !h-5" title="增加一個X軸時間點"><i class="fas fa-plus text-[10px]"></i></button>
                        <button contenteditable="false" onclick="window.removeChartRow(this)" class="toolbar-btn !bg-rose-50 text-rose-600 !px-1.5 !h-5" title="刪除最後一個時間點"><i class="fas fa-minus text-[10px]"></i></button>
                        
                        <span style="width:1px; height:12px; background:#cbd5e1; margin:0 4px;"></span>
                        
                        <span style="font-size: 10px; color:#64748b; font-weight:bold; margin-right:2px;">高:</span>
                        <input type="number" contenteditable="false" class="toolbar-btn !w-12 !h-5 !py-0 !text-[10px] text-center" value="200" step="10" min="100" max="800" onchange="window.setChartHeight(this)" title="設定圖表高度(px)">
                        <span style="font-size: 10px; color:#64748b;">px</span>

                        <button contenteditable="false" onclick="this.closest('.trend-chart-container').remove(); triggerAutoSave(document.activeElement); setTimeout(window.renderAllCharts, 50);" class="toolbar-btn !bg-transparent text-gray-400 hover:!text-red-600 !px-1.5 !h-5 ml-2" title="刪除整個圖表區塊"><i class="fas fa-trash text-[10px]"></i></button>
                    </div>
                </div>

                <!-- 佈局：並排顯示，左邊極致壓縮表格，右邊畫布 -->
                <div style="display: flex; flex-direction: row; flex-wrap: nowrap; gap: 8px; align-items: stretch; width: 100%;" class="chart-layout-wrapper">
                    
                    <!-- 數據輸入表格 (列印時隱藏) -->
                    <!-- 放寬 max-width 至 35% 以防太擁擠 -->
                    <div style="flex: 0 0 auto; max-width: 35%; overflow-x: auto; background: #f8fafc; border-radius: 4px; border: 1px dashed #cbd5e1; padding: 1px;" class="no-print chart-table-area chart-table-wrapper no-scrollbar">
                        <!-- 【全部縮小一半】：字體全面 6px，所有 padding 為 1px -->
                        <table class="chart-data-table" contenteditable="false" style="width: max-content; border-collapse: collapse; font-size: 6px; background: #fff; line-height: 1; margin: 0;">
                            <thead>
                                <tr>
                                    <th contenteditable="true" style="border: 1px solid #cbd5e1; background: #f1f5f9; padding: 1px; text-align: center; font-weight: bold; color: #475569; outline: none; min-width: 15px; white-space: nowrap; font-size: 6px;">週期</th>
                                    <th contenteditable="true" style="border: 1px solid #cbd5e1; background: #f1f5f9; padding: 1px; text-align: center; font-weight: bold; color: #475569; outline: none; min-width: 15px; white-space: nowrap; font-size: 6px;">指標 1</th>
                                    <th contenteditable="true" style="border: 1px solid #cbd5e1; background: #f1f5f9; padding: 1px; text-align: center; font-weight: bold; color: #475569; outline: none; min-width: 15px; white-space: nowrap; font-size: 6px;">指標 2</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td contenteditable="true" style="border: 1px solid #cbd5e1; padding: 1px; text-align: center; outline: none; white-space: nowrap; font-size: 6px;">Q1</td>
                                    <td contenteditable="true" style="border: 1px solid #cbd5e1; padding: 1px; text-align: center; outline: none; white-space: nowrap; font-size: 6px;" class="chart-val">10</td>
                                    <td contenteditable="true" style="border: 1px solid #cbd5e1; padding: 1px; text-align: center; outline: none; white-space: nowrap; font-size: 6px;" class="chart-val">15</td>
                                </tr>
                                <tr>
                                    <td contenteditable="true" style="border: 1px solid #cbd5e1; padding: 1px; text-align: center; outline: none; white-space: nowrap; font-size: 6px;">Q2</td>
                                    <td contenteditable="true" style="border: 1px solid #cbd5e1; padding: 1px; text-align: center; outline: none; white-space: nowrap; font-size: 6px;" class="chart-val">20</td>
                                    <td contenteditable="true" style="border: 1px solid #cbd5e1; padding: 1px; text-align: center; outline: none; white-space: nowrap; font-size: 6px;" class="chart-val">18</td>
                                </tr>
                                <tr>
                                    <td contenteditable="true" style="border: 1px solid #cbd5e1; padding: 1px; text-align: center; outline: none; white-space: nowrap; font-size: 6px;">Q3</td>
                                    <td contenteditable="true" style="border: 1px solid #cbd5e1; padding: 1px; text-align: center; outline: none; white-space: nowrap; font-size: 6px;" class="chart-val">15</td>
                                    <td contenteditable="true" style="border: 1px solid #cbd5e1; padding: 1px; text-align: center; outline: none; white-space: nowrap; font-size: 6px;" class="chart-val">22</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- 畫布區塊 (固定高度依據內聯樣式計算) -->
                    <div style="flex: 1 1 auto; height: 200px; min-width: 0; position: relative;" class="chart-canvas-area">
                        <canvas class="trend-canvas"></canvas>
                    </div>
                </div>
            </div>`;
            
            const inserted = insertHtmlAtSelection(wrapInsertedHtmlForLayout(html), { scrollToInserted: true });
            const chart = inserted && inserted.primary && inserted.primary.classList && inserted.primary.classList.contains('trend-chart-container')
                ? inserted.primary
                : (inserted && inserted.editable ? inserted.editable.querySelector('[data-trend-chart="1"]') : document.querySelector('[data-trend-chart="1"]'));
            if (chart) markTrendAnchor(chart);
            setTimeout(() => {
                document.querySelectorAll('.editable-div').forEach(div => cleanupEditable(div));
                window.renderAllCharts();
                if (chart && chart.scrollIntoView) chart.scrollIntoView({ block: 'center', behavior: 'smooth' });
                if (chart) markTrendAnchor(chart);
            }, 80);
            return chart;
        }

    </script>

            manualSave(false);

        const BlockTemplates = {
            blue: (title, text) => `<div class="content-block blue-block"><div class="block-title"><i class="fas fa-info-circle"></i> ${title}</div><div class="block-body">${text}</div></div>`,
            green: (title, text) => `<div class="content-block green-block"><div class="block-title"><i class="fas fa-check-circle"></i> ${title}</div><div class="block-body">${text}</div></div>`,

            purple: (title, text) => `<div class="content-block purple-block"><div class="block-title"><i class="fas fa-tasks"></i> ${title}</div><div class="block-body">${text}</div></div>`

        function parseHighlights(text) { 
            let cleanText = text.replace(/<span class="highlight-wrapper"[^>]*>(.*?)<\/span>/gi, '$1');

            { id: 9, icon: "fas fa-exclamation-triangle", iconColor: "#ef4444", title: "重大異常/滯留/列管案例", columns: [parseHighlights(BlockTemplates.red("事件概要與原因", "本月發生重大異常案例【0】件。事件概要：【無】。初步原因分析為：【無】。") + '<div class="block-spacer"><br></div>' + BlockTemplates.green("採取措施", "已採取臨時措施：【無】。其他船舶需立即自查項目：【常規消防救生設備檢查】。") + '<div class="block-spacer"><br></div>')], colLayout: "1", attachments: [] },

            { id: 12, icon: "fas fa-clipboard-check", iconColor: "#f97316", title: "船端執行與記錄一致性", columns: [parseHighlights(BlockTemplates.orange("現場與記錄差異", "部分船舶存在「記錄已完成，但現場操作不完全一致」的情況，主要表現在【演練記錄/安全巡查】等方面。") + '<div class="block-spacer"><br></div>' + BlockTemplates.purple("管理要求", "各輪需注意：所有記錄應能反映實際執行情況。下月將把【記錄與實際一致性】列為內部稽核重點。") + '<div class="block-spacer"><br></div>')], colLayout: "1", attachments: [] },

        document.addEventListener('selectionchange', () => {
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                const range = sel.getRangeAt(0);
                let node = range.startContainer;
                let isInside = false;
                while(node && node.nodeType !== 9) {
                    if (node.nodeType === 1 && node.classList.contains('editable-div')) {
                        isInside = true; break;
                    }
                    node = node.parentNode;
                }
                if(isInside) {
                    lastSavedRange = range.cloneRange();
                    let n = range.startContainer.nodeType === 1 ? range.startContainer : range.startContainer.parentNode;
                    lastActiveEditableDiv = n && n.closest ? n.closest('.editable-div') : null;
                }
            }
        });

        function restoreSelection() {
            if (lastSavedRange) {

                sel.removeAllRanges();

        // 核心排版修復：確保各種卡片不會因為 ensureCursorOutsideBlock 而被強制換行
        function ensureCursorOutsideBlock() {
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                let range = sel.getRangeAt(0);
                let node = range.startContainer;
                let current = node.nodeType === 1 ? node : node.parentNode;
                let blockNode = null;
                while (current && current.classList && !current.classList.contains('editable-div')) {
                    if (current.classList.contains('content-block') || 
                       (current.tagName === 'TABLE' && !current.classList.contains('data-card-table')) || 
                       current.classList.contains('kpi-card-container') || 
                       current.classList.contains('progress-card-container') || 
                       current.classList.contains('zone-card-container') || 
                       current.classList.contains('trend-chart-container') ||
                       current.tagName === 'IMG') {
                        blockNode = current;
                        break;
                    }
                    current = current.parentNode;
                }
                if (blockNode) {
                    let next = blockNode.nextElementSibling;
                    const newRange = document.createRange();
                    if (next && next.classList.contains('block-spacer')) {
                        newRange.selectNodeContents(next);
                    } else {
                        newRange.setStartAfter(blockNode);
                    }
                    newRange.collapse(true);
                    sel.removeAllRanges();
                    sel.addRange(newRange);
                }
            }
        }

        function cleanupEditable(editableDiv) {
            if (!editableDiv) return;
            
            editableDiv.querySelectorAll('.highlight-wrapper').forEach(wrapper => {
                const val = wrapper.querySelector('.highlight-val');
                if (val) {
                    val.removeAttribute('contenteditable');
                    wrapper.parentNode.insertBefore(val, wrapper);
                }
                wrapper.remove();
            });

            editableDiv.querySelectorAll('.highlight-val').forEach(val => {
                val.removeAttribute('contenteditable');
            });

            const nestedElements = editableDiv.querySelectorAll('.block-spacer .content-block, .block-spacer table.custom-data-table:not(.data-card-table), .block-spacer .kpi-card-container, .block-spacer .progress-card-container, .block-spacer .zone-card-container, .block-spacer .trend-chart-container, .block-spacer .content-inline-img');
            nestedElements.forEach(nested => {
                const parentSpacer = nested.closest('.block-spacer');
                if (parentSpacer && parentSpacer.parentNode) {
                    parentSpacer.parentNode.insertBefore(nested, parentSpacer);
                }
            });
            const mainElements = editableDiv.querySelectorAll('.content-block, table.custom-data-table:not(.data-card-table), .kpi-card-container, .progress-card-container, .zone-card-container, .trend-chart-container, .content-inline-img');
            mainElements.forEach(el => {
                if (el.classList && (el.classList.contains('layout-inline') || el.dataset.layout === 'inline')) return;
                let next = el.nextSibling;
                let hasSpacer = false;
                if (next && next.nodeType === 1 && next.classList.contains('block-spacer')) {
                    hasSpacer = true;
                } else if (next && next.nodeType === 3 && next.textContent.trim() === '') {
                    let nextNext = next.nextSibling;
                    if (nextNext && nextNext.nodeType === 1 && nextNext.classList.contains('block-spacer')) hasSpacer = true;
                }
                if (!hasSpacer) {
                    let newSpacer = document.createElement('div');
                    newSpacer.className = 'block-spacer';
                    newSpacer.innerHTML = '<br>';
                    if (el.nextSibling) el.parentNode.insertBefore(newSpacer, el.nextSibling);
                    else el.parentNode.appendChild(newSpacer);
                }
            });
            const spacers = editableDiv.querySelectorAll('.block-spacer');
            for (let i = 0; i < spacers.length; i++) {
                let spacer = spacers[i];
                let next = spacer.nextElementSibling;
                if (next && next.classList.contains('block-spacer')) next.remove();
                if (spacer.innerHTML === '') spacer.innerHTML = '<br>';
            }
        }

        const DB_NAME = 'SafetyMeetingDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'reportStore';

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                };
                request.onsuccess = (event) => resolve(event.target.result);
                request.onerror = (event) => reject(event.target.error);
            });
        }

        async function saveToDB(data, explicitTimestamp = null) {
            data = sanitizeReportDataForStorage(data);
            const dateStr = document.getElementById('reportDate').value;
            let titleStr = "月度安全會議報告";
            if (document.getElementById('mainTitle')) {
                titleStr = document.getElementById('mainTitle').innerText;
            }
            
            const fontEnVal = document.getElementById('globalFontEnSelector') ? document.getElementById('globalFontEnSelector').value : '';
            const fontZhVal = document.getElementById('globalFontZhSelector') ? document.getElementById('globalFontZhSelector').value : '';
            const periodData = {
                startM: document.getElementById('startMonth') ? document.getElementById('startMonth').value : '',
                startD: document.getElementById('startDay') ? document.getElementById('startDay').value : '',
                endM: document.getElementById('endMonth') ? document.getElementById('endMonth').value : '',
                endD: document.getElementById('endDay') ? document.getElementById('endDay').value : ''
            };
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                store.put({ 
                    id: window.currentFileId, 
                    data: data, 
                    date: dateStr, 
                    title: titleStr, 
                    period: periodData,
                    globalFontEn: fontEnVal,
                    globalFontZh: fontZhVal,
                    timestamp: explicitTimestamp || Date.now() 
                });
                transaction.oncomplete = () => {
                    if (typeof v4QueueAutoSave === 'function') v4QueueAutoSave('月報編輯');
                    resolve();
                };
                transaction.onerror = (e) => reject(e);
            });
        }

        async function loadFromDB(fileId) {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.get(fileId);
                request.onsuccess = () => resolve(request.result || null);
                request.onerror = (e) => reject(e);
            });
        }

        async function manualSave(showMsg = true) {
            if (document.activeElement && typeof document.activeElement.blur === 'function' && document.activeElement.classList.contains('editable-div')) {

            setTimeout(async () => {
                await saveToDB(reportData, Date.now());
                if (showMsg) showToast('保存成功！');
            }, 50);
        }

        function initPeriodSelects() {
            const sm = document.getElementById('startMonth'), sd = document.getElementById('startDay');
            const em = document.getElementById('endMonth'), ed = document.getElementById('endDay');
            let mOpts = '', dOpts = '';
            for(let i=1; i<=12; i++) mOpts += `<option value="${i}">${i.toString().padStart(2, '0')}</option>`;
            for(let i=1; i<=31; i++) dOpts += `<option value="${i}">${i.toString().padStart(2, '0')}</option>`;
            sm.innerHTML = em.innerHTML = mOpts;
            sd.innerHTML = ed.innerHTML = dOpts;
        }

        function setDefaultPeriod() {
            const today = new Date();
            document.getElementById('startMonth').value = today.getMonth() + 1;
            document.getElementById('startDay').value = 1;
            document.getElementById('endMonth').value = today.getMonth() + 1;
            document.getElementById('endDay').value = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
        }

        function normalizeData(dataArray) {
            return dataArray.map(item => {
                if (item.content !== undefined) { item.columns = [item.content]; delete item.content; }
                if (!item.columns) item.columns = [''];
                if (!item.colLayout) item.colLayout = item.colCount ? Array(item.colCount).fill('1').join(':') : '1';
                if (typeof item.selectedForPdf === 'undefined') item.selectedForPdf = true;
                if (typeof item.pdfOrder === 'undefined') item.pdfOrder = 0;
                return item;
            });
        }

        async function initApp() {
            showLoader();
            initPeriodSelects();
            
            let loadedFromPortable = false;
            let portableData = null;

            if (portableData && portableData.fileId) {
                window.currentFileId = portableData.fileId;
            } else {
                let storedId = localStorage.getItem('safety_report_file_id');
                if (!storedId) {
                    storedId = 'report_' + Date.now() + '_' + Math.floor(Math.random()*1000);
                    localStorage.setItem('safety_report_file_id', storedId);
                }
                window.currentFileId = storedId;
            }

            try {
                const savedData = await loadFromDB(window.currentFileId);
                let finalDataToUse = null;

                if (portableData && savedData) {
                    if (portableData.timestamp > (savedData.timestamp || 0)) {
                        finalDataToUse = portableData;
                        loadedFromPortable = true;
                    } else {
                        finalDataToUse = savedData;
                    }
                } else if (portableData) {
                    finalDataToUse = portableData;
                    loadedFromPortable = true;
                } else if (savedData) {
                    finalDataToUse = savedData;
                }

                if (finalDataToUse && finalDataToUse.reportData && finalDataToUse.reportData.length > 0) {
                    reportData = normalizeData(finalDataToUse.reportData); 
                } else if (finalDataToUse && finalDataToUse.data && finalDataToUse.data.length > 0) {
                    reportData = normalizeData(finalDataToUse.data);
                } else {
                    reportData = JSON.parse(JSON.stringify(defaultData));
                }
                
                if (finalDataToUse) {
                    document.getElementById('reportDate').value = finalDataToUse.date || new Date().toISOString().slice(0,10);
                    document.getElementById('mainTitle').innerText = finalDataToUse.title || "月度安全會議報告";
                    if (finalDataToUse.period) {
                        document.getElementById('startMonth').value = finalDataToUse.period.startM;
                        document.getElementById('startDay').value = finalDataToUse.period.startD;
                        document.getElementById('endMonth').value = finalDataToUse.period.endM;
                        document.getElementById('endDay').value = finalDataToUse.period.endD;
                    } else { setDefaultPeriod(); }
                    
                    if (finalDataToUse.globalFontEn && finalDataToUse.globalFontZh) {
                        const fontEnSel = document.getElementById('globalFontEnSelector');
                        const fontZhSel = document.getElementById('globalFontZhSelector');
                        if (fontEnSel) fontEnSel.value = finalDataToUse.globalFontEn;
                        if (fontZhSel) fontZhSel.value = finalDataToUse.globalFontZh;
                        changeGlobalFont();
                    } else if (finalDataToUse.globalFont) {
                        const fontZhSel = document.getElementById('globalFontZhSelector');
                        if (fontZhSel) fontZhSel.value = finalDataToUse.globalFont;
                        changeGlobalFont();
                    } else { changeGlobalFont(); }

                    if (loadedFromPortable) {
                        await saveToDB(reportData, portableData.timestamp);
                    }
                } else {
                    document.getElementById('reportDate').value = new Date().toISOString().slice(0,10);
                    setDefaultPeriod();
                    changeGlobalFont();
                }

                renderTable();
                buildIconGrid();
                
                // 初次載入時觸發所有的卡片更新一次位置
                setTimeout(() => {
                    document.querySelectorAll('.kpi-card-container').forEach(card => window.updateKpiCard(card));
                    document.querySelectorAll('.progress-card-container').forEach(card => window.updateProgressCard(card));
                    document.querySelectorAll('.zone-card-container').forEach(card => window.updateZoneCard(card));
                }, 300);

                if(loadedFromPortable) {
                    showToast('已成功載入本機共享資料檔。');
                }
            } catch (error) {
                console.error("載入失敗:", error);
                reportData = JSON.parse(JSON.stringify(defaultData));
                setDefaultPeriod();
                changeGlobalFont();
                renderTable();
            }
            hideLoader();
        }

        // === V4 穩定富文本核心：用 Selection/Range API 取代 document.execCommand ===
        function getActiveEditableFromSelection() {
            const sel = window.getSelection();
            if (sel && sel.rangeCount > 0) {
                let node = sel.getRangeAt(0).startContainer;
                if (node.nodeType === 3) node = node.parentNode;
                if (node && node.closest) {
                    const editable = node.closest('.editable-div, [contenteditable="true"]');
                    if (editable) return editable;
                }
            }
            if (document.activeElement && document.activeElement.closest) {
                return document.activeElement.closest('.editable-div, [contenteditable="true"]');
            }
            return null;
        }

        function saveRangeFromSelection() {
            const sel = window.getSelection();
            if (sel && sel.rangeCount > 0) lastSavedRange = sel.getRangeAt(0).cloneRange();
        }

        function ensureEditableSelection() {
            restoreSelection();
            let sel = window.getSelection();
            if (sel && sel.rangeCount > 0) {
                const editable = getActiveEditableFromSelection();
                if (editable) return { sel, range: sel.getRangeAt(0), editable };
            }
            const editable = (document.activeElement && document.activeElement.matches && document.activeElement.matches('.editable-div, [contenteditable="true"]'))
                ? document.activeElement
                : (lastActiveEditableDiv && document.body.contains(lastActiveEditableDiv) ? lastActiveEditableDiv : document.querySelector('.editable-div[contenteditable="true"]'));
            if (!editable) return null;
            editable.focus();
            const range = document.createRange();
            range.selectNodeContents(editable);
            range.collapse(false);
            sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            lastSavedRange = range.cloneRange();
            return { sel, range, editable };
        }

        function htmlToFragment(html) {
            const template = document.createElement('template');
            template.innerHTML = html;
            return template.content;
        }

        function placeCaretAfterNode(node) {
            const range = document.createRange();
            range.setStartAfter(node);
            range.collapse(true);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            lastSavedRange = range.cloneRange();
        }

        function insertHtmlAtSelection(html, options = {}) {
            const ctx = ensureEditableSelection();
            if (!ctx) return null;
            const { range, editable } = ctx;
            const editableRoot = editable.closest('.editable-div') || editable;
            range.deleteContents();
            const fragment = htmlToFragment(html);
            const insertedNodes = Array.from(fragment.childNodes);
            const lastNode = insertedNodes[insertedNodes.length - 1] || null;
            range.insertNode(fragment);
            if (lastNode) placeCaretAfterNode(lastNode);
            cleanupEditable(editableRoot);
            triggerAutoSave(editableRoot);
            saveRangeFromSelection();
            const primary = insertedNodes.find(n => n.nodeType === 1) || lastNode;
            if (options.scrollToInserted && primary && primary.scrollIntoView) {
                setTimeout(() => primary.scrollIntoView({ block: 'center', behavior: 'smooth' }), 80);
            }
            return { insertedNodes, primary, editable: editableRoot };
        }

        function markTrendAnchor(el) {
            if (!el) return;
            activeTrendAnchor = { el, top: el.getBoundingClientRect().top };
        }

        function preserveTrendAnchor() {
            if (!activeTrendAnchor || !activeTrendAnchor.el || !document.body.contains(activeTrendAnchor.el)) return;
            const rect = activeTrendAnchor.el.getBoundingClientRect();
            if (Number.isFinite(activeTrendAnchor.top)) {
                const delta = rect.top - activeTrendAnchor.top;
                if (Math.abs(delta) > 2) window.scrollBy(0, delta);
            }
            activeTrendAnchor.top = activeTrendAnchor.el.getBoundingClientRect().top;
        }

        function escapeHtmlText(text) {
            return String(text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function getSelectedTextOrPlaceholder(placeholder = '文字') {
            const sel = window.getSelection();
            if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return placeholder;
            return sel.toString() || placeholder;
        }

        function replaceSelectionWithHtml(html) {
            insertHtmlAtSelection(html);
        }

        function wrapSelectionInline(tagName, attrs = {}, placeholder = '文字') {
            const text = getSelectedTextOrPlaceholder(placeholder);
            const attrText = Object.entries(attrs).map(([k, v]) => ` ${k}="${String(v).replace(/"/g, '&quot;')}"`).join('');
            replaceSelectionWithHtml(`<${tagName}${attrText}>${escapeHtmlText(text)}</${tagName}>`);
        }

        function applyInlineColor(color) {
            wrapSelectionInline('span', { style: `color:${color};` }, '文字');
        }

        function applyInlineFontSize(sizeValue) {
            const sizeMap = { '1': '10px', '2': '12px', '3': '14px', '4': '18px', '5': '24px', '6': '32px', '7': '40px' };
            wrapSelectionInline('span', { style: `font-size:${sizeMap[String(sizeValue)] || '14px'};` }, '文字');
        }

        function fragmentTextWithBreaks(root) {
            const parts = [];
            const walk = (node) => {
                if (!node) return;
                if (node.nodeType === Node.TEXT_NODE) {
                    parts.push(node.textContent || '');
                    return;
                }
                if (node.nodeType !== Node.ELEMENT_NODE && node.nodeType !== Node.DOCUMENT_FRAGMENT_NODE) return;
                const tag = node.tagName ? node.tagName.toLowerCase() : '';
                if (tag === 'br') {
                    parts.push('\n');
                    return;
                }
                Array.from(node.childNodes).forEach(walk);
                if (['div','p','li','tr'].includes(tag)) parts.push('\n');
                if (['td','th'].includes(tag)) parts.push(' ');
            };
            walk(root);
            return parts.join('');
        }

        function getSelectedLinesForList() {
            const sel = window.getSelection();
            if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return ['項目'];
            const fragment = sel.getRangeAt(0).cloneContents();
            let text = fragmentTextWithBreaks(fragment);
            if (!text.trim()) text = sel.toString() || '';
            const lines = text.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
            return lines.length ? lines : ['項目'];
        }

        function findListFromSelection(listTag = '') {
            const ctx = ensureEditableSelection();
            if (!ctx) return null;
            let node = ctx.range.startContainer.nodeType === 1 ? ctx.range.startContainer : ctx.range.startContainer.parentNode;
            const editableRoot = ctx.editable.closest('.editable-div') || ctx.editable;
            while (node && node !== editableRoot) {
                if (node.nodeType === 1 && ['OL','UL'].includes(node.tagName)) {
                    if (!listTag || node.tagName.toLowerCase() === listTag.toLowerCase()) return node;
                }
                node = node.parentNode;
            }
            return null;
        }

        function insertHtmlWithUndo(html) {
            const ctx = ensureEditableSelection();
            if (!ctx) return false;
            const editableRoot = ctx.editable.closest('.editable-div') || ctx.editable;
            ctx.editable.focus();
            restoreSelection();
            document.execCommand('insertHTML', false, html);
            cleanupEditable(editableRoot);
            triggerAutoSave(editableRoot);
            saveRangeFromSelection();
            return true;
        }

        function unwrapListToLines(listEl) {
            if (!listEl || !listEl.parentNode) return false;
            const editableRoot = listEl.closest('.editable-div') || listEl.parentNode;
            const frag = document.createDocumentFragment();
            let lastLine = null;
            Array.from(listEl.children).forEach(li => {
                const line = document.createElement('div');
                line.innerHTML = li.innerHTML || '<br>';
                frag.appendChild(line);
                lastLine = line;
            });
            listEl.parentNode.replaceChild(frag, listEl);
            cleanupEditable(editableRoot);
            if (lastLine && document.body.contains(lastLine)) {
                const range = document.createRange();
                range.selectNodeContents(lastLine);
                range.collapse(false);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
                lastSavedRange = range.cloneRange();
                lastActiveEditableDiv = editableRoot;
            }
            triggerAutoSave(editableRoot);
            return true;
        }

        function insertListAtSelection(listTag) {
            const currentList = findListFromSelection(listTag);
            if (currentList) return unwrapListToLines(currentList);
            const otherList = findListFromSelection(listTag === 'ol' ? 'ul' : 'ol');
            if (otherList) unwrapListToLines(otherList);
            const lines = getSelectedLinesForList();
            const items = lines.map(line => `<li>${escapeHtmlText(line)}</li>`).join('');
            return insertHtmlWithUndo(`<${listTag}>${items}</${listTag}>`);
        }

        function removeFormatFromSelection() {
            const sel = window.getSelection();
            if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;
            const text = sel.toString();
            replaceSelectionWithHtml(escapeHtmlText(text).replace(/\r?\n/g, '<br>'));
        }

        // --- 富文本與區塊操作 ---
        function runRichTextCommand(command, value = null) {
            if (command === 'insertOrderedList') return insertListAtSelection('ol');
            if (command === 'insertUnorderedList') return insertListAtSelection('ul');
            const ctx = ensureEditableSelection();
            if (!ctx) return false;
            const editableRoot = ctx.editable.closest('.editable-div') || ctx.editable;
            try {
                ctx.editable.focus();
                restoreSelection();
                document.execCommand('styleWithCSS', false, true);
                const ok = document.execCommand(command, false, value);
                cleanupEditable(editableRoot);
                triggerAutoSave(editableRoot);
                saveRangeFromSelection();
                return ok;
            } catch (err) {
                console.error('富文本命令失敗:', command, err);
                return false;
            }
        }
        function execCmd(command, value = null) { 
            runRichTextCommand(command, value); 
        }
        function changeColor(color) { 
            runRichTextCommand('foreColor', color || '#111827'); 
        }
        function insertSymbol(symbol) {

        function getInsertLayoutMode() {
            const sel = document.getElementById('insertLayoutSelector');
            return sel ? sel.value : 'inline-30';
        }

        function getInsertLayout(mode = getInsertLayoutMode(), preferred = {}) {
            const base = {
                inline: true,
                width: preferred.inlineWidth || '30%',
                display: preferred.display || 'inline-block',
                prefix: '',
                suffix: '&nbsp;',
                extraClass: 'layout-inline',
                dataLayout: 'inline'
            };
            if (mode === 'inline-48') return { ...base, width: '48%', extraClass: 'layout-inline layout-half' };
            if (mode === 'block-100') return { ...base, inline: false, width: '100%', display: preferred.blockDisplay || 'block', suffix: '<div class="block-spacer"><br></div>', extraClass: 'layout-block', dataLayout: 'block' };
            if (mode === 'newline-100') return { ...base, inline: false, width: '100%', display: preferred.blockDisplay || 'block', prefix: '<div class="block-spacer"><br></div>', suffix: '<div class="block-spacer"><br></div>', extraClass: 'layout-newline layout-block', dataLayout: 'block' };
            return base;
        }

        function layoutStyle(preferred = {}, mode = getInsertLayoutMode()) {
            const l = getInsertLayout(mode, preferred);
            const margin = l.inline ? '0 6px 6px 0' : '0 0 8px 0';
            return {
                ...l,
                style: `width: ${l.width}; margin: ${margin}; display: ${l.display}; vertical-align: top; box-sizing: border-box;`
            };
        }

        function wrapInsertedHtmlForLayout(html, mode = getInsertLayoutMode()) {
            const l = getInsertLayout(mode);
            return `${l.prefix || ''}${html}${l.suffix || '&nbsp;'}`;
        }

        function ensureSpacerAfterElement(el) {
            if (!el || !el.parentNode) return;
            let next = el.nextSibling;
            if (next && next.nodeType === 3 && next.textContent.trim() === '') next = next.nextSibling;
            if (!(next && next.nodeType === 1 && next.classList.contains('block-spacer'))) {
                const spacer = document.createElement('div');
                spacer.className = 'block-spacer';
                spacer.innerHTML = '<br>';
                if (el.nextSibling) el.parentNode.insertBefore(spacer, el.nextSibling);
                else el.parentNode.appendChild(spacer);
            }
        }

        function removeSpacerAfterElement(el) {
            if (!el || !el.parentNode) return;
            let next = el.nextSibling;
            if (next && next.nodeType === 3 && next.textContent.trim() === '') next = next.nextSibling;
            if (next && next.nodeType === 1 && next.classList.contains('block-spacer')) next.remove();
        }

        function applyElementLayoutWidth(el, w) {
            if (!el) return;
            const numeric = parseFloat(String(w).replace('%', '')) || 0;
            const isFull = numeric >= 99;
            el.style.width = w;
            el.style.boxSizing = 'border-box';
            el.style.verticalAlign = 'top';
            if (isFull) {
                el.dataset.layout = 'block';
                el.classList.remove('layout-inline', 'layout-half');
                el.classList.add('layout-block');
                el.style.display = el.tagName === 'TABLE' ? 'table' : 'block';
                el.style.margin = '0 0 8px 0';
                ensureSpacerAfterElement(el);
            } else {
                el.dataset.layout = 'inline';
                el.classList.remove('layout-block', 'layout-newline');
                el.classList.add('layout-inline');
                if (numeric >= 45) el.classList.add('layout-half'); else el.classList.remove('layout-half');
                el.style.display = el.tagName === 'TABLE' ? 'inline-table' : 'inline-block';
                el.style.margin = '0 6px 6px 0';
                removeSpacerAfterElement(el);
            }
            if (el.classList.contains('trend-chart-container') && window.renderAllCharts) {
                markTrendAnchor(el);
                setTimeout(window.renderAllCharts, 80);
            }
            triggerAutoSave(el);
        }

        function triggerAutoSave(element) {
            if (!element) return;
            const editableDiv = element.classList.contains('editable-div') ? element : element.closest('.editable-div');
            if (editableDiv) {
                const tr = editableDiv.closest('tr');
                if (tr) {
                    const index = tr.dataset.index;
                    const td = editableDiv.closest('td');
                    if (td && td.cellIndex === 1) updateData(index, 'title', editableDiv.innerHTML);
                    else if (td && td.cellIndex === 2) updateColumnData(index, editableDiv.dataset.colIndex || 0, editableDiv.innerHTML);
                } else {
                    // 如果不是表格內的 .editable-div（例如主標題），直接觸發整頁保存
                    manualSave(false);
                }
            } else {
                // 對於沒有被 .editable-div 包覆的輸入框 (如日期、選擇區間等)，直接觸發保存
                manualSave(false);
            }
